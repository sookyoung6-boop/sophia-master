}
function hl(text,q){
  if(!q)return text;
  const re=new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');
  return text.replace(re,m=>`<span class="search-mark">${m}</span>`);
}
function doSearch(q){
  q=q.trim();searchQuery=q;
  const el=document.getElementById('search-results');
  if(!q){el.innerHTML='<div class="search-empty">검색어를 입력하세요</div>';return;}
  const ql=q.toLowerCase();
  const results=[];

  // 매칭 텍스트에서 snippet 추출
  function snippet(text,keyword){
    const tl=text.toLowerCase();
    const idx=tl.indexOf(keyword.toLowerCase());
    if(idx<0) return '';
    const start=Math.max(0,idx-20);
    const end=Math.min(text.length,idx+keyword.length+40);
    return (start>0?'…':'')+text.slice(start,end)+(end<text.length?'…':'');
  }

  projects.forEach(p=>{
    if(p.archived) return;

    // 프로젝트 기본정보
    const blocksText=(p.blocks||[]).map(b=>b.content||'').join(' ');
    const linksText=(p.links||[]).map(l=>l.title+' '+l.url).join(' ');
    const projFields={
      '이름':p.name, '태그':p.tag, '설명':p.desc,
      '개요':p.overview||'', '목적':p.purpose||'',
      '현황':p.statusNote||'', '리스크':p.risks||'',
      '메모':p.memo||'', '블록':blocksText, '링크':linksText
    };
    for(const [field,text] of Object.entries(projFields)){
      if(text.toLowerCase().includes(ql)){
        const snip=field!=='이름'&&field!=='태그'?snippet(text,q):'';
        results.push({type:'proj',icon:'📁',
          title:p.name,
          sub:p.tag+' · '+p.start+' – '+p.end+(snip?` · <em>${hl(snip,q)}</em>`:''),
          action:`closeSearch();openProj('${p.id}')`});
        break;
      }
    }

    p.schedules.forEach(s=>{
      // 스케줄명
      if(s.name.toLowerCase().includes(ql))
        results.push({type:'sched',icon:'📅',title:s.name,
          sub:p.name+' › 스케줄',
          action:`closeSearch();openSched('${p.id}','${s.id}')`});

      // 태스크
      s.tasks.forEach(t=>{
        const taskText=[t.name,t.meta||'',t.memo||''].join(' ');
        if(taskText.toLowerCase().includes(ql)){
          const snip=!t.name.toLowerCase().includes(ql)?snippet(taskText,q):'';
          results.push({type:'task',icon:t.done?'✅':'☐',
            title:t.name,
            sub:`${p.name} › ${s.name}${t.meta?' · '+t.meta:''}${t.dueDate?' · '+t.dueDate:''}${snip?` · <em>${hl(snip,q)}</em>`:''}`,
            action:`closeSearch();openSched('${p.id}','${s.id}')`});
        }
      });
    });

    // 블록 메모 — 별도 섹션으로
    (p.blocks||[]).forEach(b=>{
      const text=(b.content||'').replace(/<[^>]+>/g,'');
      if(text.toLowerCase().includes(ql)){
        const snip=snippet(text,q);
        results.push({type:'memo',icon:'📝',
          title:snip||text.slice(0,60),
          sub:`${p.name} › 메모`,
          action:`closeSearch();openProj('${p.id}')`,
          _isMemo:true});
      }
    });

    // 결과물 링크 — 별도 섹션으로
    (p.workAreas||[]).forEach(wa=>{
      (wa.deliverables||[]).forEach(d=>{
        const dText=(d.name||'')+' '+(d.memo||'');
        if(dText.toLowerCase().includes(ql)){
          results.push({type:'deliv',icon:d.link?'🔗':'📎',
            title:d.name,
            sub:`${p.name} › ${wa.name}${d.link?' · '+d.link.slice(0,40):''}`,
            action:`closeSearch();openProj('${p.id}')`,
            _isLink:!!d.link});
        }
      });
    });
  });

  // 공지
  notices.forEach(n=>{
    const text=n.title+' '+(n.body||'');
    if(text.toLowerCase().includes(ql)){
      const snip=!n.title.toLowerCase().includes(ql)?snippet(n.body||'',q):'';
      results.push({type:'notice',icon:'📢',
        title:n.title,
        sub:`공지 · ${n.date}${snip?` · <em>${hl(snip,q)}</em>`:''}`,
        action:`closeSearch();goHome()`});
    }
  });

  // 캠페인
  campaigns.forEach(c=>{
    const text=[c.name,c.manager||'',c.channel||'',c.result||''].join(' ');
    if(text.toLowerCase().includes(ql))
      results.push({type:'camp',icon:'🎯',title:c.name,
        sub:`캠페인 · ${c.status} · ${c.manager||''}`,
        action:`closeSearch();goHome()`});
  });

  // 회의
  meetings.forEach(m=>{
    const text=[m.title,m.attendees||'',m.notes||''].join(' ');
    if(text.toLowerCase().includes(ql)){
      const snip=!m.title.toLowerCase().includes(ql)?snippet(text,q):'';
      results.push({type:'meet',icon:'🗓',
        title:m.title,
        sub:`회의 · ${m.date} ${m.time||''}${snip?` · <em>${hl(snip,q)}</em>`:''}`,
        action:`closeSearch();goHome()`});
    }
  });

  if(!results.length){el.innerHTML='<div class="search-empty">검색 결과가 없습니다</div>';return;}

  // 섹션 분리: 프로젝트 / 메모·블록 / 링크·결과물 / 태스크 / 기타
  const sections=[
    {key:'proj',   label:'📁 프로젝트', types:['proj']},
    {key:'memo',   label:'📝 메모 · 블록', types:['memo']},
    {key:'link',   label:'🔗 링크 · 결과물', types:['deliv','link']},
    {key:'task',   label:'☐ 태스크', types:['task','sched']},
    {key:'etc',    label:'기타', types:['notice','camp','meet']},
  ];

  // 블록/메모를 별도 타입으로 분리
  results.forEach(r=>{
    if(r.type==='proj'&&r._isMemo) r.type='memo';
    if(r.type==='deliv'&&r._isLink) r.type='link';
  });

  el.innerHTML=sections.map(sec=>{
    const items=results.filter(r=>sec.types.includes(r.type));
    if(!items.length) return '';
    return `<div class="search-cat">${sec.label} <span style="font-size:12px;color:var(--text3)">${items.length}건</span></div>
    ${items.map(r=>`<div class="search-item" onclick="${r.action}">
      <span class="search-item-icon">${r.icon}</span>
      <div style="flex:1;min-width:0">
        <div class="search-item-title">${hl(r.title,q)}</div>
        <div class="search-item-sub" style="white-space:normal;line-height:1.4">${r.sub}</div>
      </div>
    </div>`).join('')}`;
  }).join('');
}

// Add ROI formula: if result contains %, extract & compute vs budget
function campFormulaHTML(c){
  const budgetNum=parseFloat((c.budget||'0').replace(/[^0-9.]/g,''))||0;
  const roiMatch=(c.result||'').match(/([\d.]+)%/);
  if(!roiMatch||!budgetNum) return '<span style="color:var(--text3)">—</span>';
  const roi=parseFloat(roiMatch[1]);
  const revenue=Math.round(budgetNum*(roi/100));
  return `<span class="formula-badge" title="예산 × 전환율 추정 계산">${revenue.toLocaleString()}원 추정</span>`;
}
function campTableHTML(){
  const list=campFilter==='전체'?campaigns:campaigns.filter(c=>c.status===campFilter);
  if(!list.length) return`<div class="empty">캠페인이 없습니다</div>`;
  const SC={'진행중':'st-active','완료':'st-done','예정':'st-pending'};
  return`<table class="camp-table"><thead><tr><th>캠페인명</th><th>단계</th><th>상태</th><th>시작일</th><th>종료일</th><th>예산(원)</th><th>담당자</th><th>채널</th><th>결과</th><th style="color:#854f0b">⨍ 추정수익</th><th></th></tr></thead>
  <tbody>${list.map(c=>`<tr>
    <td contenteditable="true" spellcheck="false" onblur="saveCamp('${c.id}','name',this.textContent)">${c.name}</td>
    <td contenteditable="true" spellcheck="false" onblur="saveCamp('${c.id}','stage',this.textContent)">${c.stage}</td>
    <td><select class="status-sel ${SC[c.status]||'st-pending'}" onchange="saveCamp('${c.id}','status',this.value);this.className='status-sel '+(({'진행중':'st-active','완료':'st-done','예정':'st-pending'})[this.value]||'st-pending')">
      ${['예정','진행중','완료'].map(s=>`<option${c.status===s?' selected':''}>${s}</option>`).join('')}</select></td>
    <td contenteditable="true" spellcheck="false" onblur="saveCamp('${c.id}','start',this.textContent)">${c.start}</td>
    <td contenteditable="true" spellcheck="false" onblur="saveCamp('${c.id}','end',this.textContent)">${c.end}</td>
    <td contenteditable="true" spellcheck="false" onblur="saveCamp('${c.id}','budget',this.textContent)">${c.budget}</td>
    <td contenteditable="true" spellcheck="false" onblur="saveCamp('${c.id}','manager',this.textContent)">${c.manager}</td>
    <td contenteditable="true" spellcheck="false" onblur="saveCamp('${c.id}','channel',this.textContent)">${c.channel}</td>
    <td contenteditable="true" spellcheck="false" onblur="saveCamp('${c.id}','result',this.textContent);if(document.getElementById('camp-table'))document.getElementById('camp-table').innerHTML=campTableHTML()">${c.result||'—'}</td>
    <td>${campFormulaHTML(c)}</td>
    <td><button class="btn danger xs" onclick="deleteCamp('${c.id}')">✕</button></td>
  </tr>`).join('')}</tbody></table>`;
}

let notifications=[];

function addNotif(text,action){
  notifications.unshift({id:uid(),text,time:new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}),read:false,action:action||null});
  updateNotifBadge();

function updateNotifBadge(){

function toggleNotifPanel(){
  if(notifPanelOpen){closeNotifPanel();return;}
  notifPanelOpen=true;
  const panel=document.createElement('div');panel.className='notif-panel';panel.id='notif-panel';
  panel.innerHTML=`<div class="notif-head">
    <span style="font-size:14px;font-weight:700">알림</span>
    <button class="btn xs ghost" onclick="clearNotifs()">모두 지우기</button>
  </div>
  ${notifications.length?notifications.map(n=>`<div class="notif-item" onclick="clickNotif('${n.id}')">
    <div class="${n.read?'notif-dot-read':'notif-dot-new'}"></div>
    <div><div class="notif-text">${n.text}</div><div class="notif-time">${n.time}</div></div>
  </div>`).join(''):'<div class="search-empty" style="padding:20px">새 알림이 없습니다</div>'}`;
  document.body.appendChild(panel);
  notifications.forEach(n=>n.read=true);updateNotifBadge();
  setTimeout(()=>document.addEventListener('click',closeNotifOnOutside),50);
}
function closeNotifOnOutside(e){
  const p=document.getElementById('notif-panel'),b=document.getElementById('notif-bell');
  if(p&&!p.contains(e.target)&&!b.contains(e.target)){closeNotifPanel();}
}
function closeNotifPanel(){
  const p=document.getElementById('notif-panel');if(p)document.body.removeChild(p);
  notifPanelOpen=false;
  document.removeEventListener('click',closeNotifOnOutside);
}
function clearNotifs(){notifications=[];closeNotifPanel();updateNotifBadge();}
function clickNotif(id){const n=notifications.find(x=>x.id===id);closeNotifPanel();if(n&&n.action)eval(n.action);}

// Request notification permission
function requestNotifPermission(){
  if('Notification' in window&&Notification.permission==='default'){
    Notification.requestPermission().then(p=>{if(p==='granted')toast('알림이 활성화됐습니다')});
  }
}

// Check overdue tasks and fire notifications on load
function checkOverdueTasks(){
  const today_str=new Date().toISOString().slice(0,10);
  projects.forEach(p=>{
    p.schedules.forEach(s=>{
      if(s.status==='진행중'){
        const dateMatch=s.date.match(/(\d{4}\.\d{2}\.\d{2})\s*[–-]\s*(\d{4}\.\d{2}\.\d{2})/);
        if(dateMatch){
          const endDate=dateMatch[2].replace(/\./g,'-');
          if(endDate<today_str)
            addNotif(`"${s.name}" 스케줄 기한이 지났습니다 (${p.name})`,`openProj('${p.id}')`);
        }
      }
    });
  });
}

// ─── TASK BOARD ──────────────────────────────────────────────
let tbView='board'; // 'board' | 'timeline' | 'table'
let tbFilter='전체'; // '전체' | dept name
let tbPersonFilter='전체'; // '전체' | person name

// Flatten all tasks across projects with context
function getAllTasks(){
  const rows=[];
  projects.forEach(p=>{
    p.schedules.forEach(s=>{
      s.tasks.forEach(t=>{
        // meta에서 파트 추론, 없으면 프로젝트 파트 fallback
        const metaDepts=deptsFromMeta(t.meta);
        const depts=metaDepts.length?metaDepts:p.departments;
        rows.push({
          ...t,
          projId:p.id, projName:p.name, projColor:p.color,
          schedId:s.id, schedName:s.name,
          dept: depts[0]||'기타',
          depts: depts,
        });
      });
    });
  });
  return rows;
}
// ─── 팀원 → 파트 매핑 ────────────────────────────────────────
const MEMBER_DEPT = {
  '대표':    'CEO',
  '김수경':  'COO',
  '정예진':  '운영팀',
  '엘레':    '운영팀',
  '김수아':  '운영팀',
  '두안':    '운영팀',
  '김보강':  '운영팀',
  '박수진':  '경영지원팀',
  '김진흥':  '경영지원팀',
  '정보겸':  '콘텐츠파트',
  '최원선':  '콘텐츠파트',
  '오경민':  '디자인파트',
  '발롱탕':  '디자인파트',
  '강효진':  '디자인파트',
};

// meta(담당자 문자열)에서 파트 목록 추출
function deptsFromMeta(meta){
  if(!meta) return [];
  const names=meta.split(/[,·\/+\s]+/).map(m=>m.trim()).filter(Boolean);
  const depts=new Set();
  names.forEach(n=>{
    // 이름 직접 매핑
    if(MEMBER_DEPT[n]) depts.add(MEMBER_DEPT[n]);
    // 파트명 직접 입력된 경우 (e.g. "COO", "운영팀")
    const knownDepts=['CEO','COO','운영팀','경영지원팀','콘텐츠파트','디자인파트'];
    if(knownDepts.includes(n)) depts.add(n);
  });
  return [...depts];
}

function getAllDepts(){
  // 고정 파트 순서
  return ['전체','CEO','COO','운영팀','경영지원팀','콘텐츠파트','디자인파트'];
}
function getAllPersons(){
  return ['전체',...teamMembers];
}

// Apply all active task board filters
function applyTbFilters(tasks){
  let result=tasks;
  if(tbFilter!=='전체') result=result.filter(t=>{
    // 담당자(meta)에서 파트 추론
    const metaDepts=deptsFromMeta(t.meta);
    if(metaDepts.includes(tbFilter)) return true;
    // fallback: 프로젝트 departments
    return t.depts&&t.depts.includes(tbFilter);
  });
  if(tbPersonFilter!=='전체') result=result.filter(t=>{
    if(!t.meta)return false;
    return t.meta.split(/[,·\/+\s]+/).map(m=>m.trim()).filter(m=>m.length>1).includes(tbPersonFilter);
  });
  if(tbHideDone) result=result.filter(t=>!t.done);
  return result;
}

function workloadViewHTML(){
  const allTasks=getAllTasks(); // 완료 포함 전체
  const today=new Date();today.setHours(0,0,0,0);

  const knownMembers=new Set(Object.keys(MEMBER_DEPT));
  const knownDepts=new Set(Object.values(MEMBER_DEPT));

  // 파트 → 팀원 역방향 매핑 (COO → ['김수경'], 운영팀 → ['정예진', ...])
  const deptToMembers={};
  Object.entries(MEMBER_DEPT).forEach(([member,dept])=>{
    if(!deptToMembers[dept]) deptToMembers[dept]=[];
    deptToMembers[dept].push(member);
  });

  // 팀원별 / 파트별(팀원 특정 불가) / 외주
  const personMap={}, deptMap={}, outsourceMap={};

  allTasks.forEach(t=>{
    const names=(t.meta||'').split(/[,·\/\s]+/).map(s=>s.trim()).filter(s=>s.length>1);
    if(!names.length){
      if(!personMap['미지정']) personMap['미지정']={total:0,done:0,overdue:[],soon:[],normal:[],dept:''};
      pushTask(personMap['미지정'],t,today);
      return;
    }
    names.forEach(name=>{
      if(knownMembers.has(name)){
        // 직접 이름 입력
        if(!personMap[name]) personMap[name]={total:0,done:0,overdue:[],soon:[],normal:[],dept:MEMBER_DEPT[name]||''};
        pushTask(personMap[name],t,today);
      } else if(knownDepts.has(name)){
        const members=deptToMembers[name]||[];
        if(members.length===1){
          // 팀원이 1명뿐인 파트(COO 등) → 해당 팀원 카드에 합산
          const member=members[0];
          if(!personMap[member]) personMap[member]={total:0,done:0,overdue:[],soon:[],normal:[],dept:MEMBER_DEPT[member]||''};
          pushTask(personMap[member],t,today);
        } else {
          // 여러 명인 파트 → 파트 카드
          if(!deptMap[name]) deptMap[name]={total:0,done:0,overdue:[],soon:[],normal:[]};
          pushTask(deptMap[name],t,today);
        }
      } else {
        // 등록되지 않은 이름 → 외주
        if(!outsourceMap[name]) outsourceMap[name]={total:0,done:0,overdue:[],soon:[],normal:[],dept:'외주'};
        pushTask(outsourceMap[name],t,today);
      }
    });
  });

  function pushTask(m,t,today){
    m.total++;
    if(t.done){ m.done++; return; }
    if(t.dueDate){
      const d=parseLocalDate(t.dueDate);d.setHours(0,0,0,0);
      const diff=Math.round((d-today)/864e5);
      if(diff<0) m.overdue.push(t);
      else if(diff<=3) m.soon.push(t);
      else m.normal.push(t);
    } else m.normal.push(t);
  }

  function renderCard(name, m, clickName){
    const statusColor=m.overdue.length?'#E24B4A':m.soon.length?'#EF9F27':(m.total-m.done===0)?'#27ae60':'#378ADD';
    const topTasks=[...m.overdue,...m.soon,...m.normal].slice(0,3);
    return `<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer"
      onclick="tbPersonFilter='${clickName}';tbFilter='전체';setTbView('board');renderTaskBoard();showView('v-tasks')"
      onmouseenter="this.style.borderColor='var(--border2)'" onmouseleave="this.style.borderColor='var(--border)'">
      <div style="padding:12px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)">
        <div style="width:32px;height:32px;border-radius:50%;background:${statusColor};display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0">${name[0]}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:14px;font-weight:600;color:var(--text)">${name}</div>
          ${m.dept?`<div style="font-size:14px;color:var(--text3)">${m.dept}</div>`:''}
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-size:18px;font-weight:700;color:var(--text);font-family:var(--mono);line-height:1">${m.total-m.done}건</div>
          <div style="font-size:14px;color:var(--text3)">미완료</div>
        </div>
      </div>
      <div style="padding:8px 14px;display:flex;gap:5px;flex-wrap:wrap">
        ${m.overdue.length?`<span style="font-size:14px;background:#fdf2f2;color:#E24B4A;padding:2px 8px;border-radius:10px;font-weight:500">초과 ${m.overdue.length}</span>`:''}
        ${m.soon.length?`<span style="font-size:14px;background:#faeeda;color:#854f0b;padding:2px 8px;border-radius:10px;font-weight:500">곧마감 ${m.soon.length}</span>`:''}
        ${m.normal.length?`<span style="font-size:14px;background:#eaf3de;color:#3b6d11;padding:2px 8px;border-radius:10px">여유 ${m.normal.length}</span>`:''}
      </div>
      <div style="padding:0 14px 10px">
        ${topTasks.map(t=>{
          const diff=t.dueDate?Math.round((parseLocalDate(t.dueDate)-today)/864e5):null;
          const isOverdue=diff!==null&&diff<0;
          const isSoon=diff!==null&&diff>=0&&diff<=3;
          return `<div style="display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px dashed var(--border)">
            <div style="width:5px;height:5px;border-radius:50%;background:${isOverdue?'#E24B4A':isSoon?'#EF9F27':'#a8a49e'};flex-shrink:0"></div>
            <div style="font-size:14px;color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.name}</div>
            ${diff!==null?`<span style="font-size:14px;color:${isOverdue?'#E24B4A':isSoon?'#EF9F27':'var(--text3)'};flex-shrink:0">${isOverdue?`D+${-diff}`:diff===0?'오늘':`D-${diff}`}</span>`:''}
          </div>`;
        }).join('')}
        ${(m.total-m.done)>3?`<div style="font-size:14px;color:var(--text3);padding-top:4px">+${m.total-m.done-3}건 더 →</div>`:''}
      </div>
    </div>`;
  }

  const personEntries=Object.entries(personMap).filter(([,m])=>m.total-m.done>0).sort((a,b)=>(b[1].total-b[1].done)-(a[1].total-a[1].done));
  const deptEntries=Object.entries(deptMap).filter(([,m])=>m.total-m.done>0).sort((a,b)=>(b[1].total-b[1].done)-(a[1].total-a[1].done));

    ${outsourceEntries.length?`

  if(tbPersonFilter!=='전체') base=base.filter(t=>t.meta&&t.meta.split(/[,·\/]/).map(m=>m.trim()).includes(tbPersonFilter));
  const today=new Date();today.setHours(0,0,0,0);

    {key:'완료',    label:'완료',    color:'#27ae60', bg:'#eaf3de'},

      <div class="bv-col-head" style="border-top:3px solid ${st.color}">

    <div style="padding:10px 20px;font-size:14px;color:var(--text3)">카드를 드래그해서 상태를 변경할 수 있습니다</div>`;

// 상태 보드 드래그
let _statusDragTask=null, _statusDragEl=null, _statusDragged=false;
function statusDragStart(e,pid,sid,tid){
  _statusDragTask={pid,sid,tid};
  _statusDragEl=e.currentTarget;
  _statusDragged=false;
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',tid);
  setTimeout(()=>{if(_statusDragEl){_statusDragEl.style.opacity='.35';_statusDragEl.style.pointerEvents='none';}},0);
}
function statusDragEnd(e){
  if(_statusDragEl){_statusDragEl.style.opacity='1';_statusDragEl.style.pointerEvents='';}
  _statusDragEl=null;
  setTimeout(()=>{_statusDragTask=null; setTimeout(()=>{_statusDragged=false;},100);},200);
}
function statusDrop(e,newStatus){
  e.preventDefault();e.stopPropagation();
  _statusDragged=true;
  if(!_statusDragTask)return;
  const {pid,sid,tid}=_statusDragTask;
  const p=projects.find(x=>x.id===pid);
  const s=p?.schedules.find(x=>x.id===sid);
  const t=s?.tasks.find(x=>x.id===tid);
  if(!t)return;
  t.taskStatus=newStatus;
  if(newStatus==='완료') t.done=true;
  else if(t.done&&newStatus!=='완료') t.done=false;
  saveToLS();
  _statusDragTask=null;
  document.getElementById('tb-body').innerHTML=statusBoardHTML();
  toast(`"${t.name}" → ${newStatus}`);
}

// ── DEPT TIMELINE VIEW ───────────────────────────────────────
function deptTimelineHTML(){
  const allTasks=getAllTasks();
  // 파트 필터 걸릴 때 해당 파트만 표시
  const depts=tbFilter!=='전체'?[tbFilter]:getAllDepts().slice(1);
  const filtered=applyTbFilters(allTasks);

  // compute global date range
  const allDates=[];
  filtered.forEach(t=>{
    if(t.startDate) allDates.push(parseLocalDate(t.startDate));
    if(t.dueDate)   allDates.push(parseLocalDate(t.dueDate));
  });
  if(!allDates.length){
    return `<div style="padding:24px;text-align:center;color:var(--text3);font-size:14px">태스크에 날짜를 입력하면 타임라인이 표시됩니다.<br><span style="font-size:14px">스케줄 상세 → 태스크 추가 시 시작일/마감일 입력, 또는 ✎ 버튼으로 편집</span></div>`;
  }
  const minD=new Date(Math.min(...allDates.map(d=>d.getTime())));
  const maxD=new Date(Math.max(...allDates.map(d=>d.getTime())));
  minD.setDate(minD.getDate()-2); maxD.setDate(maxD.getDate()+4);
  const totalMs=maxD-minD; const totalDays=Math.round(totalMs/(864e5));

  const today=new Date();today.setHours(0,0,0,0);
  const todayPct=Math.max(0,Math.min(100,((today-minD)/totalMs)*100));

  // build month header
  const step=Math.max(1,Math.ceil(totalDays/14));
  let dayLabels='';
  for(let i=0;i<=totalDays;i+=step){
    const d=new Date(minD);d.setDate(d.getDate()+i);
    const isT=d.toDateString()===today.toDateString();
    dayLabels+=`<div style="position:absolute;left:${(i/totalDays)*100}%;font-size:14px;color:${isT?'var(--red)':'var(--text3)'};font-family:var(--mono);font-weight:${isT?700:400};white-space:nowrap">${d.getMonth()+1}/${d.getDate()}</div>`;
  }

  const groups=depts.map(dept=>{
    const tasks=filtered.filter(t=>t.depts.includes(dept)||t.dept===dept);
    if(!tasks.length) return '';
    const dc=deptColor(dept);
    const rows=tasks.map(t=>{
      const c=COLORS[t.projColor];
      const sd=t.startDate?parseLocalDate(t.startDate):null;
      const ed=t.dueDate?parseLocalDate(t.dueDate):null;
      let bar='';
      if(sd||ed){
        const ref=sd||ed;
        const l=Math.max(0,((( sd||ed)-minD)/totalMs)*100);
        const r=Math.min(100,(((ed||sd)-minD)/totalMs)*100);
        const w=Math.max(1,r-l);
        bar=`<div style="position:absolute;left:${l}%;width:${w}%;height:16px;border-radius:4px;background:${t.done?'#a8a49e':c.dot};display:flex;align-items:center;padding:0 6px;font-size:14px;color:#fff;white-space:nowrap;overflow:hidden;z-index:1" title="${t.name}">${w>10?t.name:''}</div>`;
      }
      return `<div class="dtl-row">
        <div class="dtl-label">
          <div class="dtl-check${t.done?' on':''}" onclick="toggleTaskByRef('${t.projId}','${t.schedId}','${t.id}')">${t.done?'✓':''}</div>
          <span class="dtl-name${t.done?' done':''}" title="${t.name}">${t.name}</span>
        </div>
        <div class="dtl-track">
          ${Array.from({length:Math.ceil(totalDays/step)+1},(_,i)=>`<div style="position:absolute;left:${Math.min(100,(i*step/totalDays)*100)}%;top:0;bottom:0;width:1px;background:var(--border)"></div>`).join('')}
          <div style="position:absolute;left:${todayPct}%;top:0;bottom:0;width:1.5px;background:var(--red);z-index:2"></div>
          ${bar||`<div style="padding:0 8px;font-size:14px;color:var(--text3);font-style:italic">날짜 없음</div>`}
        </div>
      </div>`;
    }).join('');

    return `<div class="dtl-group">
      <div class="dtl-group-head">
        <div style="display:flex;align-items:center;gap:8px;width:170px;flex-shrink:0">
          <span style="font-size:14px;font-weight:700;color:${dc.t};background:${dc.bg};padding:2px 9px;border-radius:10px">${dept}</span>
          <span style="font-size:14px;color:var(--text3)">${tasks.length}</span>
        </div>
      </div>
      ${rows}
    </div>`;
  }).join('');

  return `<div class="dtl-wrap">
    <div style="min-width:770px">
      <div style="display:flex;border-bottom:1px solid var(--border);height:28px;position:sticky;top:0;background:var(--surface);z-index:3">
        <div style="width:170px;flex-shrink:0"></div>
        <div style="flex:1;position:relative;min-width:600px">${dayLabels}<div style="position:absolute;left:${todayPct}%;top:0;bottom:0;width:1.5px;background:var(--red)"></div></div>
      </div>
      ${groups||'<div style="padding:24px;color:var(--text3);font-size:14px;text-align:center">해당 조건의 태스크가 없습니다</div>'}
    </div>
  </div>`;
}

function tbCycleStatus(pid,sid,tid){
  const p=projects.find(x=>x.id===pid),s=p?.schedules.find(x=>x.id===sid),t=s?.tasks.find(x=>x.id===tid);
  if(!t)return;
  const seq=['예정','진행중','검토중','완료'];
  const cur=t.taskStatus||(t.done?'완료':'예정');

// ─── AUTOMATION ENGINE ───────────────────────────────────────

const DEFAULT_RULES = {
  scheduleAutoStatus: true,   // 태스크 100% 완료 시 스케줄 자동 완료
  scheduleAutoStart: true,    // 첫 태스크 체크 시 스케줄 자동 시작
  dueDateAlert3: true,        // D-3일 자동 알림
  dueDateAlertOverdue: true,  // 마감 초과 자동 알림
  weeklyAutoSuggest: true,    // 이번 주 마감 태스크를 주간 목표에 자동 제안
  projectDateSync: true,      // 스케줄 날짜에서 프로젝트 기간 자동 계산
};

// Main automation runner — call after any data mutation
function automate(pid) {
  if(!projects||!projects.length) return;
  const toRun = pid ? [projects.find(x=>x.id===pid)].filter(Boolean) : projects;
  toRun.forEach(p => {
    if(!p||!p.schedules) return;
    if (!p.autoRules) p.autoRules = {...DEFAULT_RULES};
    if (!p.autoLog)   p.autoLog = [];
    const rules = p.autoRules;
    const today = new Date(); today.setHours(0,0,0,0);

    p.schedules.forEach(s => {
      const tasks = s.tasks;
      if (!tasks.length) return;
      const doneCount = tasks.filter(t=>t.done).length;
      const pct = Math.round(doneCount / tasks.length * 100);

      // ① Auto-start schedule on first task checked
      if (rules.scheduleAutoStart && doneCount === 1 && s.status === '예정') {
        s.status = '진행중';
        logAuto(p, '🔄', `"${s.name}" 자동으로 진행중으로 변경됐습니다`, s.id);
      }
      // ② Auto-complete schedule when all tasks done
      if (rules.scheduleAutoStatus && pct === 100 && s.status !== '완료') {
        s.status = '완료';
        logAuto(p, '✅', `"${s.name}" 모든 태스크 완료 → 스케줄 자동 완료`, s.id);
      }
      // ③ Revert to 진행중 if undone a task and was 완료
      if (rules.scheduleAutoStatus && pct < 100 && s.status === '완료' && doneCount > 0) {
        s.status = '진행중';
        logAuto(p, '↩️', `"${s.name}" 태스크 미완료 → 진행중으로 되돌림`, s.id);
      }

      // ④ D-day alerts on tasks
      tasks.filter(t => !t.done && t.dueDate).forEach(t => {
        const due = parseLocalDate(t.dueDate); due.setHours(0,0,0,0);
        const diff = Math.round((due - today) / 864e5);
        const key = `notif_${p.id}_${t.id}`;
        const lastNotif = t._lastNotif || '';

        if (rules.dueDateAlertOverdue && diff < 0 && lastNotif !== 'overdue') {
          t._lastNotif = 'overdue';
          addNotif(`⚠️ "${t.name}" D+${-diff} 마감 초과 (${p.name})`, `openSched('${p.id}','${s.id}')`);
          logAuto(p, '⚠️', `"${t.name}" 마감 D+${-diff} 초과`, s.id);
        } else if (rules.dueDateAlert3 && diff >= 0 && diff <= 3 && lastNotif !== `d${diff}`) {
          t._lastNotif = `d${diff}`;
          addNotif(`🔔 "${t.name}" D-${diff} 마감 임박 (${p.name})`, `openSched('${p.id}','${s.id}')`);
          if (diff <= 1) logAuto(p, '🔔', `"${t.name}" D-${diff} 마감 임박`, s.id);
        }
      });
    });

    // ⑤ Auto-sync project dates from schedules
    if (rules.projectDateSync) {
      const allDates = p.schedules.map(s => s.date).filter(Boolean);
      if (allDates.length) {
        const starts = allDates.map(d => { const m = d.match(/(\d{4}\.\d{2})/); return m?m[1]:null; }).filter(Boolean);
        const ends   = allDates.map(d => { const m = d.match(/(\d{4}\.\d{2})(?:\.\d{2})?\s*[–-]\s*(\d{4}\.\d{2})/); return m?m[2]:null; }).filter(Boolean);
        if (starts.length) {
          const newStart = starts.sort()[0];
          if (p.start !== newStart) { p.start = newStart; }
        }
        if (ends.length) {
          const newEnd = ends.sort().reverse()[0];
          if (p.end !== newEnd) { p.end = newEnd; }
        }
      }
    }

    // ⑥ Auto-suggest weekly goals from this week's tasks
    if (rules.weeklyAutoSuggest) autoSuggestWeeklyGoals(p);

    // Trim log
    if (p.autoLog.length > 30) p.autoLog = p.autoLog.slice(0, 30);
  });
}

// ─── 변경 이력 ───────────────────────────────────────────────
function projHistoryHTML(p){
  const history=[...(p.history||[]),...(p.autoLog||[]).map(l=>({...l,_auto:true}))];
  history.sort((a,b)=>b.ts-a.ts);
  if(!history.length) return `<div class="content"><div class="empty" style="padding:40px">아직 변경 이력이 없습니다</div></div>`;
  const grouped={};
  history.forEach(h=>{
    const d=new Date(h.ts);
    const key=d.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
    if(!grouped[key]) grouped[key]=[];
    grouped[key].push(h);
  });
  return `<div class="content" style="max-width:640px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <div style="font-size:14px;font-weight:700;color:var(--text)">변경 이력 <span style="font-size:14px;color:var(--text3);font-weight:400">${history.length}건</span></div>
      <button class="btn xs ghost" onclick="clearHistory('${p.id}')">이력 지우기</button>
    </div>
    ${Object.entries(grouped).map(([date,items])=>`
      <div style="margin-bottom:24px">
        <div style="font-size:14px;font-weight:600;color:var(--text3);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)">${date}</div>
        ${items.map((h,i)=>{
          const isAuto=h._auto;
          return `<div style="display:flex;gap:12px;padding:8px 0;${i<items.length-1?'border-bottom:1px solid var(--border)':''}">
            <div style="width:28px;height:28px;border-radius:50%;background:${isAuto?'var(--surface2)':'#e6f1fb'};flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px">${h.icon||'📝'}</div>
            <div style="flex:1;min-width:0">
              <div style="font-size:14px;color:var(--text);line-height:1.5">${h.msg||h.text||''}</div>
              <div style="font-size:14px;color:var(--text3);margin-top:2px;display:flex;gap:8px;flex-wrap:wrap">
                ${h.author?`<span>${h.author}</span>`:''}
                <span style="font-family:var(--mono)">${h.time||''}</span>
                ${isAuto?'<span style="background:var(--surface2);padding:1px 5px;border-radius:4px;font-size:14px">자동</span>':''}
              </div>
            </div>
          </div>`;
        }).join('')}
      </div>`).join('')}
  </div>`;
}

function logHistory(pid, icon, msg, author){
  const p=projects.find(x=>x.id===pid);
  if(!p) return;
  if(!p.history) p.history=[];
  const now=new Date();
  p.history.unshift({
    id:uid(), icon, msg,
    author: author||'김수경',
    time: now.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}),
    ts: now.getTime()
  });
  if(p.history.length>50) p.history=p.history.slice(0,50);
}

function clearHistory(pid){
  const p=projects.find(x=>x.id===pid);if(!p)return;
  cfm('이력 지우기','모든 변경 이력과 자동화 로그를 삭제합니다.',()=>{
    p.history=[];p.autoLog=[];saveToLS();

}

function logAuto(p, icon, msg, sid) {
  if (!p.autoLog) p.autoLog = [];
  // deduplicate — don't log same message twice in 1 minute
  const last = p.autoLog[0];
  if (last && last.msg === msg && (Date.now() - last.ts) < 60000) return;
  p.autoLog.unshift({ id: uid(), icon, msg, sid: sid||null, time: new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}), ts: Date.now() });
}

// ⑥ Weekly goals auto-suggest
function autoSuggestWeeklyGoals(p) {
  if (!p.weeklyGoals) p.weeklyGoals = [];
  const today = new Date(); today.setHours(0,0,0,0);
  const weekEnd = new Date(today); weekEnd.setDate(today.getDate() + 7);

  const thisWeekTasks = p.schedules.flatMap(s => s.tasks.map(t=>({...t,schedId:s.id}))).filter(t => {
    if (t.done || !t.dueDate) return false;
    const due = parseLocalDate(t.dueDate); due.setHours(0,0,0,0);
    return due >= today && due <= weekEnd;
  });
  if (!thisWeekTasks.length) return;

  const weekLabel = `${today.getMonth()+1}월 ${Math.ceil(today.getDate()/7)}주차`;
  let block = p.weeklyGoals.find(w => w.range === weekLabel);
  if (!block) { block = {range: weekLabel, goals: [], autoGenerated: true}; p.weeklyGoals.unshift(block); }

  // collect existing taskIds already in goals
  const existingTaskIds = new Set(block.goals.map(g=>(typeof g==='object'?g.taskId:null)).filter(Boolean));

  thisWeekTasks.forEach(t => {
    if (existingTaskIds.has(t.id)) return;
    const text = `[${t.meta||''}] ${t.name}`.trim();
    block.goals.push({text, done: t.done, taskId: t.id, schedId: t.schedId, projId: p.id});
  });
}

// Project health score
function projectHealth(p) {
  const allT = p.schedules.flatMap(s=>s.tasks);
  if (!allT.length) return {label:'데이터 없음', cls:'health-idle', score: 0};
  const today = new Date(); today.setHours(0,0,0,0);
  const overdue = allT.filter(t => !t.done && t.dueDate && parseLocalDate(t.dueDate) < today).length;
  const dueIn3  = allT.filter(t => {
    if (t.done || !t.dueDate) return false;
    const diff = Math.round((parseLocalDate(t.dueDate) - today)/864e5);
    return diff >= 0 && diff <= 3;
  }).length;
  const pr = prog(p);
  if (overdue > 0)          return {label:`위험 · 초과 ${overdue}건`, cls:'health-bad', score: 1};
  if (dueIn3 > 0)           return {label:`주의 · D-3 이내 ${dueIn3}건`, cls:'health-warn', score: 2};
  if (pr === 100)           return {label:'완료', cls:'health-ok', score: 4};
  if (pr >= 50)             return {label:'정상 진행 중', cls:'health-ok', score: 3};
  return {label:'진행 중', cls:'health-idle', score: 2};
}

function toggleAutoRule(pid, key, val) {
  const p = projects.find(x=>x.id===pid);
  if (!p.autoRules) p.autoRules = {...DEFAULT_RULES};
  p.autoRules[key] = val;
  saveToLS();
  toast(`${val?'✅':'⏸'} ${key} ${val?'활성화':'비활성화'}`);
}

function runAutoNow(pid) {
  automate(pid);
  saveToLS();
  // refresh current view
  const p = projects.find(x=>x.id===pid);
  if (document.getElementById('auto-panel')) {
    document.getElementById('auto-panel').innerHTML = autoRulesHTML(p);
  }
  // refresh sched list if visible
  if (document.getElementById('sched-list')) {
    document.getElementById('sched-list').innerHTML = schedListHTML(p, COLORS[p.color]);
  }
  toast('자동화 실행 완료');
  updateSb();
}

function clearAutoLog(pid) {
  const p = projects.find(x=>x.id===pid);
  p.autoLog = [];
  saveToLS();
  document.getElementById('auto-panel').innerHTML = autoRulesHTML(p);
}

}

function exportData(){
  saveToLS();

function importData(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const parsed=JSON.parse(e.target.result);
      // validate structure
      if(!parsed.projects) throw new Error('올바른 Spextrum 데이터 파일이 아닙니다');
      cfm('데이터 가져오기',`프로젝트 ${parsed.projects.length}개, 태스크 ${parsed.projects.flatMap(p=>p.schedules?.flatMap(s=>s.tasks)||[]).length}개가 포함되어 있습니다.\n\n현재 데이터를 덮어씁니다. 계속하시겠습니까?`,()=>{
        try{const d=JSON.parse(e.target.result);applyFirebaseData(d);saveToLS();}catch(e2){toast('가져오기 실패');return;}
        toast('✅ 가져오기 완료!');
        setTimeout(()=>location.reload(),900);
      });
    }catch(err){
      toast('❌ 파일 오류: '+err.message);
    }
  };
  reader.readAsText(file);
}

function openMeetingReport(){
  const today=new Date();today.setHours(0,0,0,0);
  const dow=today.getDay()||7;
  const thisMon=new Date(today);thisMon.setDate(today.getDate()-(dow-1));
  const thisSun=new Date(thisMon);thisSun.setDate(thisMon.getDate()+6);
  const lastMon=new Date(thisMon);lastMon.setDate(thisMon.getDate()-7);
  const lastSun=new Date(thisMon);lastSun.setDate(thisMon.getDate()-1);

  const fmt=d=>`${d.getMonth()+1}/${d.getDate()}`;
  const fmtFull=d=>`${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;

  const allTasks=projects.flatMap(p=>(p.schedules||[]).flatMap(s=>(s.tasks||[]).map(t=>({
    ...t, projName:p.name, projId:p.id, schedName:s.name,
    departments:p.departments||[], color:p.color
  }))));

  // 저번주 완료
  const lastWeekDone=allTasks.filter(t=>{
    if(!t.done) return false;
    const d=t.dueDate?parseLocalDate(t.dueDate):null;
    const s=t.startDate?parseLocalDate(t.startDate):null;
    return (d&&d>=lastMon&&d<=lastSun)||(s&&s>=lastMon&&s<=lastSun);
  });

  // 이번주 예정
  const thisWeekPlan=allTasks.filter(t=>{
    if(t.done) return false;
    if(t.taskStatus==='보류') return false;
    const d=t.dueDate?parseLocalDate(t.dueDate):null;
    const s=t.startDate?parseLocalDate(t.startDate):null;
    return (d&&d>=thisMon&&d<=thisSun)||(s&&s>=thisMon&&s<=thisSun);
  });

  // 미완료/보류: 마감 초과 + 보류 상태
  const issues=allTasks.filter(t=>{
    if(t.done) return false;
    if(t.taskStatus==='보류') return true;
    if(t.dueDate&&parseLocalDate(t.dueDate)<today) return true;
    return false;
  });

  const byDept=(tasks)=>{
    const map={};
    tasks.forEach(t=>{
      // 담당자에서 파트 추론 (우선), fallback으로 프로젝트 departments
      const metaDepts=deptsFromMeta(t.meta);
      const depts=metaDepts.length?metaDepts:(t.departments.length?t.departments:['기타']);
      depts.forEach(dept=>{
        if(!map[dept]) map[dept]=[];
        if(!map[dept].find(x=>x.id===t.id)) map[dept].push(t);
      });
    });
    return map;
  };

  const lastMap=byDept(lastWeekDone);
  const thisMap=byDept(thisWeekPlan);
  const issueMap=byDept(issues);
  const allDepts=[...new Set([...Object.keys(lastMap),...Object.keys(thisMap),...Object.keys(issueMap)])].sort();

  const DEPT_COLORS={
    'COO':'#185fa5','콘텐츠파트':'#3c3489','디자인파트':'#854f0b',
    '운영팀':'#27ae60','경영지원팀':'#E24B4A','CEO':'#1a1917','기타':'#888'
  };

  const tableRows=allDepts.map(dept=>{
    const done=(lastMap[dept]||[]);
    const plan=(thisMap[dept]||[]);
    const iss=(issueMap[dept]||[]);
    const maxRows=Math.max(done.length,plan.length,iss.length,1);
    const color=DEPT_COLORS[dept]||'#378ADD';

    return Array.from({length:maxRows},(_,i)=>{
      const d=done[i];
      const p=plan[i];
      const v=iss[i];
      const isOverdue=v&&v.dueDate&&parseLocalDate(v.dueDate)<today&&!v.done;
      const diff=v&&v.dueDate?Math.round((today-parseLocalDate(v.dueDate))/864e5):null;
      return `<tr>
        ${i===0?`<td rowspan="${maxRows}" style="background:${color}18;color:${color};font-weight:700;font-size:14px;text-align:center;vertical-align:middle;padding:8px 6px;border:1px solid #e0ddd8;border-right:2px solid ${color}">${dept}</td>`:''}
        <td style="padding:7px 10px;border:1px solid #e0ddd8;font-size:14px;vertical-align:middle">${d?`<span style="color:#27ae60;margin-right:4px">✓</span>${d.projName} · ${d.name}${d.meta?`<br><span style='font-size:14px;color:#999'>${d.meta}</span>`:''}`:''}</td>
        <td style="padding:7px 10px;border:1px solid #e0ddd8;font-size:14px;vertical-align:middle">${p?`<span style="color:#185fa5">${p.projName} · ${p.name}</span>${p.dueDate?`<br><span style='font-size:14px;color:#999'>마감 ${p.dueDate}</span>`:''}`:''}</td>
        <td style="padding:7px 10px;border:1px solid #e0ddd8;font-size:14px;vertical-align:middle">${v?`<span style="color:${isOverdue?'#E24B4A':'#854f0b'};margin-right:4px">${isOverdue?'⚠️':'🔸'}</span>${v.projName} · ${v.name}${isOverdue&&diff?`<br><span style='font-size:14px;color:#E24B4A'>D+${diff} 초과</span>`:''}${v.taskStatus==='보류'?`<br><span style='font-size:14px;color:#854f0b'>보류 중</span>`:''}`:''}</td>
      </tr>`;
    }).join('');
  }).join('');

  const ov=document.createElement('div');
  ov.id='meeting-report-ov';
  ov.style.cssText='position:fixed;inset:0;background:#f7f6f2;z-index:1000;overflow-y:auto;padding:32px 40px';
  ov.innerHTML=`
    <div style="max-width:1200px;margin:0 auto">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px">
        <div>
          <div style="font-size:14px;font-weight:600;color:#888;letter-spacing:.1em;margin-bottom:4px">SPEXTRUM 주간 보고</div>
          <div style="font-size:20px;font-weight:700">${fmt(thisMon)} – ${fmt(thisSun)} 주간 업무 보고</div>
          <div style="font-size:14px;color:#999;margin-top:3px">${fmtFull(today)} 기준</div>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn sm" onclick="window.print()">🖨️ 인쇄/PDF</button>
          <button class="btn sm" onclick="document.getElementById('meeting-report-ov').remove()">✕ 닫기</button>
        </div>
      </div>
      <table style="width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 8px rgba(0,0,0,.08)">
        <thead>
          <tr style="background:#1a1917;color:#fff">
            <th style="padding:10px 12px;font-size:14px;font-weight:600;width:90px;text-align:center">파트</th>
            <th style="padding:10px 12px;font-size:14px;font-weight:600;width:30%">✅ 저번 주 완료 (${fmt(lastMon)}–${fmt(lastSun)})</th>
            <th style="padding:10px 12px;font-size:14px;font-weight:600;width:30%">📅 이번 주 예정 (${fmt(thisMon)}–${fmt(thisSun)})</th>
            <th style="padding:10px 12px;font-size:14px;font-weight:600;background:#3d1a1a">⚠️ 미완료 · 보류</th>
          </tr>
        </thead>
        <tbody>
          ${tableRows||`<tr><td colspan="4" style="text-align:center;padding:20px;color:#999">태스크가 없습니다</td></tr>`}
        </tbody>
      </table>
      <div style="margin-top:16px;font-size:14px;color:#aaa;text-align:right">* 시작일 또는 마감일이 해당 주에 속한 태스크 기준 · 마감 초과 및 보류 상태 태스크 포함</div>
    </div>
    <style>@media print{button{display:none!important}}</style>
  `;
  document.body.appendChild(ov);
}


function openWeeklyReport(){
  const now=new Date();
  const day=now.getDay();
  const diffToMon=day===0?-6:1-day;
  const thisMon=new Date(now);thisMon.setDate(now.getDate()+diffToMon);thisMon.setHours(0,0,0,0);
  const thisSun=new Date(thisMon);thisSun.setDate(thisMon.getDate()+6);thisSun.setHours(23,59,59,999);
  const lastMon=new Date(thisMon);lastMon.setDate(thisMon.getDate()-7);
  const lastSun=new Date(thisMon);lastSun.setDate(thisMon.getDate()-1);lastSun.setHours(23,59,59,999);
  const fmt=d=>`${d.getMonth()+1}/${d.getDate()}`;
  const fmtFull=d=>`${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
  const today=new Date();today.setHours(0,0,0,0);

  const allT=projects.flatMap(p=>p.schedules.flatMap(s=>s.tasks));
  const totalDone=allT.filter(t=>t.done).length;
  const totalOverdue=allT.filter(t=>!t.done&&t.dueDate&&parseLocalDate(t.dueDate)<today).length;
  const activeProjs=projects.filter(p=>p.schedules.some(s=>s.status==='진행중')).length;

  const projSections=projects.map(p=>{
    const c=COLORS[p.color];
    const allPT=p.schedules.flatMap(s=>s.tasks);
    const pr=prog(p);
    const lastWeekDone=allPT.filter(t=>t.done&&t.dueDate&&parseLocalDate(t.dueDate)>=lastMon&&parseLocalDate(t.dueDate)<=lastSun);
    const lastWeekDoneNoDt=allPT.filter(t=>t.done&&!t.dueDate);
    const lastWeekAll=[...lastWeekDone,...lastWeekDoneNoDt];
    const thisWeekTasks=allPT.filter(t=>{if(t.done||!t.dueDate)return false;const d=parseLocalDate(t.dueDate);return d>=thisMon&&d<=thisSun;});
    const overdueTasks=allPT.filter(t=>!t.done&&t.dueDate&&parseLocalDate(t.dueDate)<today);

    return `<div style="margin-bottom:28px;break-inside:avoid">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;padding-bottom:8px;border-bottom:2.5px solid ${c.dot}">
        <div style="width:10px;height:10px;border-radius:50%;background:${c.dot};flex-shrink:0"></div>
        <div style="font-size:16px;font-weight:700;color:#1a1917;flex:1">${p.name}</div>
        <span style="font-size:14px;background:${c.tag};color:${c.tagT};padding:3px 10px;border-radius:10px;font-weight:600">${p.tag}</span>
        <span style="font-size:14px;font-weight:700;color:${c.dot};font-family:monospace">${pr}%</span>
      </div>
      ${p.statusNote?`<div style="background:#f7f6f2;border-left:3px solid ${c.dot};padding:8px 12px;border-radius:0 6px 6px 0;font-size:14px;color:#1a1917;margin-bottom:12px;line-height:1.6">
        <span style="font-size:14px;font-weight:700;color:#888;display:block;margin-bottom:3px;letter-spacing:.06em;text-transform:uppercase">현재 상태</span>${p.statusNote}</div>`:''}
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px">
        <div>
          <div style="font-size:14px;font-weight:700;color:#888;letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px">✅ 저번 주 완료 (${fmt(lastMon)}–${fmt(lastSun)})</div>
          ${lastWeekAll.length?lastWeekAll.map(t=>`<div style="font-size:14px;color:#444;padding:4px 0;border-bottom:1px solid #eee;line-height:1.5"><span style="color:#27ae60;margin-right:5px">✓</span>${t.name}${t.meta?`<span style="font-size:14px;color:#aaa;margin-left:4px">${t.meta}</span>`:''}</div>`).join(''):'<div style="font-size:14px;color:#aaa;font-style:italic;padding:4px 0">기록 없음</div>'}
        </div>
        <div>
          <div style="font-size:14px;font-weight:700;color:#888;letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px">📅 이번 주 예정 (${fmt(thisMon)}–${fmt(thisSun)})</div>
          ${thisWeekTasks.length?sortTasks(thisWeekTasks,'date').map(t=>{const diff=Math.round((parseLocalDate(t.dueDate)-today)/864e5);const urg=diff<=1?'color:#E24B4A;font-weight:600':diff<=3?'color:#854f0b':'';return`<div style="font-size:14px;color:#333;padding:4px 0;border-bottom:1px solid #eee;display:flex;justify-content:space-between;gap:8px"><span>${t.name}${t.meta?`<span style="font-size:14px;color:#aaa;margin-left:4px">${t.meta}</span>`:''}</span><span style="font-size:14px;font-family:monospace;flex-shrink:0;${urg}">D-${diff}</span></div>`;}).join(''):'<div style="font-size:14px;color:#aaa;font-style:italic;padding:4px 0">없음</div>'}
        </div>
        <div>
          <div style="font-size:14px;font-weight:700;color:${overdueTasks.length?'#c0392b':'#888'};letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px">${overdueTasks.length?'⚠️ 마감 초과':'📋 현황'}</div>
          ${overdueTasks.length?overdueTasks.map(t=>{const diff=Math.round((today-parseLocalDate(t.dueDate))/864e5);return`<div style="font-size:14px;color:#c0392b;padding:4px 0;border-bottom:1px solid #fdf2f2;display:flex;justify-content:space-between"><span>${t.name}</span><span style="font-size:14px;font-family:monospace">D+${diff}</span></div>`;}).join(''):`<div style="font-size:14px;color:#555;padding:2px 0">진행중 ${p.schedules.filter(s=>s.status==='진행중').length}단계 · ${allPT.filter(t=>t.done).length}/${allPT.length} 완료</div>`}
        </div>
      </div>
    </div>`;
  }).join('');

  const html='<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><title>Spextrum 주간 리포트</title>'
    +'<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:"Apple SD Gothic Neo","Malgun Gothic",sans-serif;font-size:14px;color:#1a1917;background:#fff;padding:32px 40px;max-width:1000px;margin:0 auto}@media print{body{padding:16px 20px}@page{margin:1.5cm}}</style>'
    +'</head><body>'
    +'<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;padding-bottom:16px;border-bottom:3px solid #1a1917">'
      +'<div><div style="font-size:14px;font-weight:600;color:#888;letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px">SPEXTRUM WEEKLY REPORT</div>'
      +'<div style="font-size:22px;font-weight:700">'+fmt(thisMon)+' – '+fmt(thisSun)+', '+thisMon.getFullYear()+'</div>'
      +'<div style="font-size:14px;color:#888;margin-top:4px">작성일: '+fmtFull(now)+'</div></div>'
      +'<div style="display:flex;gap:20px;text-align:center">'
        +'<div><div style="font-size:22px;font-weight:700;color:#185fa5">'+activeProjs+'</div><div style="font-size:14px;color:#888;margin-top:3px">진행중 프로젝트</div></div>'
        +'<div><div style="font-size:22px;font-weight:700">'+totalDone+'/'+allT.length+'</div><div style="font-size:14px;color:#888;margin-top:3px">태스크 완료</div></div>'
        +(totalOverdue?'<div><div style="font-size:22px;font-weight:700;color:#c0392b">'+totalOverdue+'</div><div style="font-size:14px;color:#888;margin-top:3px">마감 초과</div></div>':'')
      +'</div>'
    +'</div>'
    +projSections
    +'<div style="margin-top:24px;padding-top:12px;border-top:1px solid #eee;font-size:14px;color:#aaa;text-align:right">Spextrum Business OS · 자동 생성</div>'
    +'<script>document.title="Spextrum 주간리포트 '+fmt(thisMon)+'";setTimeout(()=>{},200)<\/script>'
    +'</body></html>';

  const w=window.open('','_blank','width=1100,height=800,scrollbars=yes');
  if(w){w.document.write(html);w.document.close();}
  toast('주간 리포트 생성 완료! Ctrl+P로 PDF 저장 가능');
}

function tspHandleMetaSel(val){
  const custom=document.getElementById('tsp-meta-custom');
  if(val==='__custom__'||val===''){
    if(custom) custom.style.display='block';
    if(val==='') tspSaveField('meta','');
  } else {
    if(custom){ custom.style.display='none'; custom.value=''; }
    tspSaveField('meta',val);
  }
}

function tspSaveField(field,val){
  const p=projects.find(x=>x.id===_tspPid);
  const s=p?.schedules.find(x=>x.id===_tspSid);
  const t=s?.tasks.find(x=>x.id===_tspTid);
  if(!t)return;
  t[field]=val;
  if(field==='taskStatus') t.done=(val==='완료');
  saveToLS();
}

function tspMemoKeydown(e){

    const pop=document.createElement('div');
    pop.id='tsp-slash-pop';
    pop.style.cssText='position:fixed;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);box-shadow:0 8px 24px rgba(0,0,0,.14);z-index:9999;padding:4px 0;min-width:190px;max-height:320px;overflow-y:auto';
    const rect=e.target.getBoundingClientRect();
    pop.style.top=Math.min(rect.bottom+4, window.innerHeight-330)+'px';
    pop.style.left=rect.left+'px';
    const groups=[
      {label:'텍스트 스타일', items:[
        ['B','굵게','bold','font-weight:700'],
        ['I','기울임','italic','font-style:italic'],
        ['U','밑줄','underline','text-decoration:underline'],
        ['S','취소선','strikeThrough','text-decoration:line-through'],
        ['🖊','형광펜','hilite',''],
      ]},
      {label:'구조', items:[
        ['H1','큰 제목','h1','font-size:18px;font-weight:700'],
        ['H2','중간 제목','h2','font-size:15px;font-weight:600'],
        ['•','글머리 목록','ul',''],
        ['1.','번호 목록','ol',''],
        ['❝','인용구','blockquote',''],
        ['</>','코드','code','font-family:monospace'],
      ]},
      {label:'삽입', items:[
        ['—','구분선','divider',''],
        ['🔗','링크 추가','link',''],
        ['☐','체크리스트','check',''],
      ]},
      {label:'색상', items:[
        ['A','빨강','color-red','color:#E24B4A'],
        ['A','파랑','color-blue','color:#185fa5'],
        ['A','초록','color-green','color:#27ae60'],
        ['A','회색','color-gray','color:var(--text3)'],
        ['A','기본색','color-reset',''],
      ]},
    ];
    pop.innerHTML=groups.map(g=>`
      <div style="padding:4px 12px 2px;font-size:14px;font-weight:600;color:var(--text3);letter-spacing:.06em;text-transform:uppercase">${g.label}</div>
      ${g.items.map(([icon,label,cmd,style])=>`
        <div onmousedown="event.preventDefault();tspSlashCmd('${cmd}',this.closest('#tsp-slash-pop'))"
          style="padding:6px 14px;cursor:pointer;font-size:14px;display:flex;gap:10px;align-items:center"
          onmouseenter="this.style.background='var(--surface2)'" onmouseleave="this.style.background=''">
          <span style="width:22px;text-align:center;font-size:14px;${style};flex-shrink:0">${icon}</span>
          <span>${label}</span>
        </div>`).join('')}`).join('');
    document.body.appendChild(pop);
    setTimeout(()=>document.addEventListener('click',function h(){pop.remove();document.removeEventListener('click',h);}),0);
  }
}

function tspSlashCmd(cmd, pop){
  if(pop) pop.remove();
  if(cmd==='link'){ tspAddLink(); return; }
  if(cmd==='divider'){ document.execCommand('insertText',false,'\n—————\n'); return; }
  if(cmd==='check'){ document.execCommand('insertText',false,'☐ '); return; }
  if(cmd==='h1'){ document.execCommand('formatBlock',false,'h3'); return; }
  if(cmd==='h2'){ document.execCommand('formatBlock',false,'h4'); return; }
  if(cmd==='ul'){ document.execCommand('insertUnorderedList'); return; }
  if(cmd==='ol'){ document.execCommand('insertOrderedList'); return; }
  if(cmd==='blockquote'){ document.execCommand('formatBlock',false,'blockquote'); return; }
  if(cmd==='code'){ document.execCommand('formatBlock',false,'pre'); return; }
  if(cmd==='hilite'){ document.execCommand('hiliteColor',false,'#fff3a3'); return; }
  if(cmd==='bold'){ document.execCommand('bold'); return; }
  if(cmd==='italic'){ document.execCommand('italic'); return; }
  if(cmd==='underline'){ document.execCommand('underline'); return; }
  if(cmd==='strikeThrough'){ document.execCommand('strikeThrough'); return; }
  if(cmd==='color-red'){ document.execCommand('foreColor',false,'#E24B4A'); return; }
  if(cmd==='color-blue'){ document.execCommand('foreColor',false,'#185fa5'); return; }
  if(cmd==='color-green'){ document.execCommand('foreColor',false,'#27ae60'); return; }
  if(cmd==='color-gray'){ document.execCommand('foreColor',false,'#999'); return; }
  if(cmd==='color-reset'){ document.execCommand('foreColor',false,'inherit'); return; }
}

  modal(`<div class="m-title">🔗 링크 추가</div>

    ${[['📊 구글 시트','https://docs.google.com/spreadsheets/'],['📄 구글 독스','https://docs.google.com/document/'],['🎨 Figma','https://figma.com/'],['🔗 기타','https://']].map(([lbl,u])=>

function tspSaveLink(){
  tspSaveLinkWith(_tspPid, _tspSid, _tspTid);
}

function tspSaveLinkWith(pid, sid, tid){
  const title=document.getElementById('tsp-link-title')?.value.trim();
  const url=document.getElementById('tsp-link-url')?.value.trim();
  const toArchive=document.getElementById('tsp-link-archive')?.checked;
  if(!url){toast('URL을 입력해주세요');return;}
  closeModal();
  // pid/sid/tid를 직접 받아서 처리 (_tspPid가 초기화돼도 안전)
  const p=projects.find(x=>x.id===pid);
  const s=p?.schedules.find(x=>x.id===sid);
  const t=s?.tasks.find(x=>x.id===tid);
  if(!t){toast('태스크를 찾을 수 없습니다');return;}
  if(!t.links) t.links=[];
  const linkId=uid();
  t.links.push({id:linkId,title:title||url,url});
  if(toArchive&&p){
    if(!p.workAreas) p.workAreas=[];
    let wa=p.workAreas.find(w=>w.id==='tsp-links-wa');
    if(!wa){wa={id:'tsp-links-wa',name:'태스크 링크',deliverables:[]};p.workAreas.push(wa);}
    wa.deliverables.push({id:uid(),name:title||url,done:false,link:url,_fromTask:t.id});
    toast('링크 추가 및 아카이브 자동 연동됐습니다');
  } else {
    toast('링크가 추가됐습니다');
  }
  saveToLS();
  // 사이드 패널이 아직 열려있으면 링크 목록 새로고침
  const linksEl=document.getElementById('tsp-links');
  if(linksEl) linksEl.innerHTML=(t.links||[]).map(l=>`
    <div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)">
      <a href="${l.url}" target="_blank" style="font-size:14px;color:#185fa5;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${l.title||l.url}</a>
      <button onclick="tspRemoveLink('${l.id}')" style="background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px;flex-shrink:0">✕</button>
    </div>`).join('')||'<div style="font-size:14px;color:var(--text3)">링크 없음</div>';
}

function tspRemoveLink(lid){
  const p=projects.find(x=>x.id===_tspPid);
  const s=p?.schedules.find(x=>x.id===_tspSid);
  const t=s?.tasks.find(x=>x.id===_tspTid);
  if(!t)return;
  t.links=(t.links||[]).filter(l=>l.id!==lid);
  saveToLS();
  const linksEl=document.getElementById('tsp-links');
  if(linksEl) linksEl.innerHTML=(t.links||[]).map(l=>`
    <div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)">
      <a href="${l.url}" target="_blank" style="font-size:14px;color:#185fa5;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${l.title||l.url}</a>
      <button onclick="tspRemoveLink('${l.id}')" style="background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px;flex-shrink:0">✕</button>
    </div>`).join('')||'<div style="font-size:14px;color:var(--text3)">링크 없음</div>';
  toast('링크가 삭제됐습니다');
}

function tspCommentListHTML(comments){
  if(!comments||!comments.length) return '<div style="font-size:14px;color:var(--text3)">아직 코멘트가 없습니다</div>';
  return comments.map(c=>`
    <div class="tsp-comment-item" data-cid="${c.id}">
      <div class="tsp-avatar">${(c.author||'?')[0]}</div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">
          <strong style="font-size:14px;color:var(--text2)">${c.author||''}</strong>
          <span style="font-size:14px;color:var(--text3)">${c.time||''}</span>
          ${c.edited?'<span style="font-size:14px;color:var(--text3)">(수정됨)</span>':''}
        </div>
        <div id="cmt-text-${c.id}" style="font-size:14px;color:var(--text);line-height:1.5;background:var(--surface2);border-radius:var(--rsm);padding:6px 10px">${escHtml(c.text)}</div>
        <div id="cmt-edit-${c.id}" style="display:none;margin-top:5px">
          <textarea style="width:100%;font-size:14px;border:1px solid var(--border2);border-radius:var(--rsm);padding:6px 10px;outline:none;resize:vertical;font-family:var(--sans);color:var(--text);background:var(--surface);line-height:1.5;box-sizing:border-box"
            rows="2">${c.text}</textarea>
          <div style="display:flex;gap:6px;margin-top:5px">
            <button class="btn xs pri" onclick="tspSaveEdit('${c.id}')">저장</button>
            <button class="btn xs ghost" onclick="tspCancelEdit('${c.id}')">취소</button>
          </div>
        </div>
        <div style="display:flex;gap:8px;margin-top:4px;opacity:0;transition:opacity .15s" class="cmt-actions">
          <button onclick="tspStartEdit('${c.id}')" style="background:none;border:none;cursor:pointer;font-size:14px;color:var(--text3);padding:0">수정</button>
          <button onclick="tspDeleteComment('${c.id}')" style="background:none;border:none;cursor:pointer;font-size:14px;color:var(--red,#c0392b);padding:0">삭제</button>
          <button onclick="tspArchiveComment('${c.id}','${escHtml(c.text).replace(/'/g,"&#39;")}')" style="background:none;border:none;cursor:pointer;font-size:14px;color:var(--text3);padding:0">📦 아카이브</button>
        </div>
      </div>
    </div>`).join('');
}

function tspArchiveMemo(){
  const p=projects.find(x=>x.id===_tspPid);
  const t=p?.schedules.find(x=>x.id===_tspSid)?.tasks.find(x=>x.id===_tspTid);
  if(!t)return;
  const memo=document.getElementById('tsp-memo-el')?.textContent?.trim()||t.memo||'';
  if(!memo){toast('메모 내용이 없습니다');return;}
  tspSaveToArchive(p, `📝 ${t.name} — 메모`, memo);
}

function tspArchiveComment(cid, text){
  const p=projects.find(x=>x.id===_tspPid);
  const t=p?.schedules.find(x=>x.id===_tspSid)?.tasks.find(x=>x.id===_tspTid);
  if(!t||!text)return;
  tspSaveToArchive(p, `💬 ${t.name} — 코멘트`, text);
}

function tspSaveToArchive(p, name, content){
  if(!p)return;
  if(!p.workAreas) p.workAreas=[];
  let wa=p.workAreas.find(w=>w.id==='tsp-notes-wa');
  if(!wa){
    wa={id:'tsp-notes-wa',name:'메모 & 코멘트',deliverables:[]};
    p.workAreas.push(wa);
  }
  wa.deliverables.push({
    id:uid(),
    name,
    done:false,
    memo:content,
    _archivedAt:new Date().toLocaleDateString('ko-KR',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})
  });
  saveToLS();
  toast('결과물 아카이브에 저장됐습니다 📦');
}

function tspAddComment(){
  const inp=document.getElementById('tsp-comment-inp');
  const text=inp?.value.trim();if(!text)return;
  const p=projects.find(x=>x.id===_tspPid);
  const s=p?.schedules.find(x=>x.id===_tspSid);
  const t=s?.tasks.find(x=>x.id===_tspTid);
  if(!t)return;
  if(!t.comments)t.comments=[];
  const now=new Date();
  t.comments.push({id:uid(),author:'김수경',text,
    time:now.toLocaleDateString('ko-KR',{month:'short',day:'numeric'})+' '+now.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}),
    ts:now.getTime()});
  inp.value='';
  saveToLS();
  document.getElementById('tsp-comment-list').innerHTML=tspCommentListHTML(t.comments);
}

function tspStartEdit(cid){
  document.getElementById(`cmt-text-${cid}`).style.display='none';
  document.getElementById(`cmt-edit-${cid}`).style.display='block';
  document.querySelector(`[data-cid="${cid}"] .cmt-actions`).style.opacity='0';
  document.querySelector(`#cmt-edit-${cid} textarea`)?.focus();
}

function tspCancelEdit(cid){
  document.getElementById(`cmt-text-${cid}`).style.display='';
  document.getElementById(`cmt-edit-${cid}`).style.display='none';
}

function tspSaveEdit(cid){
  const ta=document.querySelector(`#cmt-edit-${cid} textarea`);
  if(!ta)return;
  const newText=ta.value.trim();
  if(!newText)return;
  const p=projects.find(x=>x.id===_tspPid);
  const s=p?.schedules.find(x=>x.id===_tspSid);
  const t=s?.tasks.find(x=>x.id===_tspTid);
  if(!t)return;
  const c=t.comments?.find(x=>x.id===cid);
  if(!c)return;
  c.text=newText;c.edited=true;
  saveToLS();
  document.getElementById('tsp-comment-list').innerHTML=tspCommentListHTML(t.comments);
  toast('코멘트가 수정됐습니다');
}

function tspDeleteComment(cid){
  const p=projects.find(x=>x.id===_tspPid);
  const s=p?.schedules.find(x=>x.id===_tspSid);
  const t=s?.tasks.find(x=>x.id===_tspTid);
  if(!t)return;
  t.comments=(t.comments||[]).filter(c=>c.id!==cid);
  saveToLS();
  document.getElementById('tsp-comment-list').innerHTML=tspCommentListHTML(t.comments);
  toast('코멘트가 삭제됐습니다');
}

function closeSidePanel(){
  document.getElementById('task-side-panel').classList.remove('open');
  document.getElementById('tsp-overlay').style.display='none';
  // 태스크 목록 새로고침
  if(_tspPid&&_tspSid){
    const el=document.getElementById('task-list');
    if(el){const p=projects.find(x=>x.id===_tspPid);const s=p?.schedules.find(x=>x.id===_tspSid);if(s)el.outerHTML=taskListHTML(p,s);}
  }
  _tspPid=null;_tspSid=null;_tspTid=null;
}

function openKpiDetail(type){
  const today=new Date();today.setHours(0,0,0,0);
  if(type==='total'){
    const rows=(projects||[]).map(p=>{
      const c=COLORS[p.color];const pr=prog(p);
      return `<div onclick="closeModal();openProj('${p.id}')" style="display:flex;align-items:center;gap:12px;padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer" onmouseenter="this.style.background='var(--surface2)'" onmouseleave="this.style.background=''">
        <span style="width:8px;height:8px;border-radius:50%;background:${c.dot};flex-shrink:0"></span>
        <div style="flex:1"><div style="font-size:14px;font-weight:500">${p.name}</div><div style="font-size:14px;color:var(--text3)">${p.tag} · ${p.start}–${p.end}</div></div>
        <div style="font-size:14px;font-weight:600;color:${pr===100?'#27ae60':'var(--text2)'}">${pr}%</div>
      </div>`;
    }).join('');
    modal(`<div class="m-title">전체 프로젝트 ${projects.length}개</div><div style="margin:0 -20px;border-top:1px solid var(--border);max-height:400px;overflow-y:auto">${rows}</div><div class="btn-row" style="margin-top:14px"><button class="btn sm" onclick="closeModal()">닫기</button></div>`);
  } else if(type==='active'){
    const active=(projects||[]).filter(p=>p.schedules&&p.schedules.some(s=>s.status==='진행중'));
    const rows=active.map(p=>{
      const c=COLORS[p.color];
      const activeSched=p.schedules.filter(s=>s.status==='진행중');
      return `<div onclick="closeModal();openProj('${p.id}')" style="display:flex;align-items:center;gap:12px;padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer" onmouseenter="this.style.background='var(--surface2)'" onmouseleave="this.style.background=''">
        <span style="width:8px;height:8px;border-radius:50%;background:${c.dot};flex-shrink:0"></span>
        <div style="flex:1"><div style="font-size:14px;font-weight:500">${p.name}</div><div style="font-size:14px;color:var(--text3)">${activeSched.map(s=>s.name).join(', ')}</div></div>
        <span style="font-size:14px;padding:2px 7px;border-radius:6px;background:#e6f1fb;color:#185fa5">진행중 ${activeSched.length}</span>
      </div>`;
    }).join('');
    modal(`<div class="m-title">진행중 프로젝트 ${active.length}개</div><div style="margin:0 -20px;border-top:1px solid var(--border);max-height:400px;overflow-y:auto">${rows||'<div class="empty" style="padding:20px">없습니다</div>'}</div><div class="btn-row" style="margin-top:14px"><button class="btn sm" onclick="closeModal()">닫기</button></div>`);
  } else if(type==='meeting'){
    const prefix=today.getFullYear()+'.'+String(today.getMonth()+1).padStart(2,'0');
    const thisMonth=(meetings||[]).filter(m=>m&&m.date&&m.date.startsWith(prefix));
    if(!thisMonth.length){toast('이번 달 회의가 없습니다');return;}
    const rows=thisMonth.map(m=>`
      <div style="padding:10px 14px;border-bottom:1px solid var(--border)">
        <div style="font-size:14px;font-weight:500">${m.title}</div>
        <div style="font-size:14px;color:var(--text3);margin-top:3px">${m.date} ${m.time||''} · ${m.attendees||''}</div>
        ${m.notes?`<div style="font-size:14px;color:var(--text2);margin-top:3px">${m.notes}</div>`:''}
      </div>`).join('');
    modal(`<div class="m-title">이번 달 회의 ${thisMonth.length}건</div><div style="margin:0 -20px;border-top:1px solid var(--border);max-height:400px;overflow-y:auto">${rows}</div><div class="btn-row" style="margin-top:14px"><button class="btn sm" onclick="closeModal()">닫기</button></div>`);
  } else if(type==='campaign'){
    const active=(campaigns||[]).filter(c=>c&&c.status==='진행중');
    if(!active.length){toast('진행중 캠페인이 없습니다');return;}
    const rows=active.map(c=>`
      <div style="padding:10px 14px;border-bottom:1px solid var(--border)">
        <div style="font-size:14px;font-weight:500">${c.name}</div>
        <div style="font-size:14px;color:var(--text3);margin-top:3px">${c.start||''}–${c.end||''} · ${c.manager||''}</div>
      </div>`).join('');
    modal(`<div class="m-title">진행중 캠페인 ${active.length}개</div><div style="margin:0 -20px;border-top:1px solid var(--border);max-height:400px;overflow-y:auto">${rows}</div><div class="btn-row" style="margin-top:14px"><button class="btn sm" onclick="closeModal()">닫기</button></div>`);
  }
}
