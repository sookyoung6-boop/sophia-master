function toggleGoal(pid,wi,gi){
  const p=projects.find(x=>x.id===pid);
  if(!p.weeklyGoals[wi])return;
  const goals=p.weeklyGoals[wi].goals;
  const g=goals[gi];

  // normalize to object
  if(typeof g==='string'){
    goals[gi]={text:g,done:true};
  } else {
    goals[gi]={...g,done:!g.done};
  }

  const updated=goals[gi];

  // ↔ 연동된 태스크도 함께 완료/미완료 처리
  if(updated.taskId&&updated.projId){
    const tp=projects.find(x=>x.id===updated.projId);
    if(tp){
      tp.schedules.forEach(s=>{
        const t=s.tasks.find(x=>x.id===updated.taskId);
        if(t){
          t.done=updated.done;
          t.taskStatus=updated.done?'완료':(t.taskStatus==='완료'?'진행중':t.taskStatus||'예정');
        }
      });
    }
  }

  saveToLS();
  document.getElementById('weekly-goals').innerHTML=weeklyGoalsHTML(p);
}

// MINI CALENDAR
function projCalHTML(p){
  const now=new Date();
  const yr=now.getFullYear(),mo=now.getMonth();
  return calMonthHTML(p,yr,mo);
}
function calMonthHTML(p,yr,mo){
  const monthNames=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const days=['일','월','화','수','목','금','토'];
  const first=new Date(yr,mo,1).getDay();
  const last=new Date(yr,mo+1,0).getDate();
  const today=new Date();

  // collect schedule dates for this month
  const schedDates={};
  p.schedules.forEach(s=>{
    const m=s.date.match(/(\d{4})\.(\d{2})\.(\d{2})\s*[–-]\s*(\d{4})\.(\d{2})\.(\d{2})/);
    if(m){
      const sd=new Date(+m[1],+m[2]-1,+m[3]),ed=new Date(+m[4],+m[5]-1,+m[6]);
      for(let d=new Date(sd);d<=ed;d.setDate(d.getDate()+1)){
        if(d.getFullYear()===yr&&d.getMonth()===mo){
          const k=d.getDate();schedDates[k]=(schedDates[k]||[]);schedDates[k].push(s);
        }
      }
    }
  });

  let cells='';
  for(let i=0;i<first;i++) cells+=`<div></div>`;
  for(let d=1;d<=last;d++){
    const isToday=today.getFullYear()===yr&&today.getMonth()===mo&&today.getDate()===d;
    const hasSched=schedDates[d]&&schedDates[d].length>0;
    const dot=hasSched?`<div style="width:4px;height:4px;border-radius:50%;background:${COLORS[p.color].dot};margin:1px auto 0"></div>`:'';
    cells+=`<div style="text-align:center;padding:4px 2px;font-size:14px;border-radius:6px;cursor:default;${isToday?'background:'+COLORS[p.color].dot+';color:#fff;font-weight:700':hasSched?'color:var(--text);font-weight:500':'color:var(--text2)'}" title="${hasSched?schedDates[d].map(s=>s.name).join(', '):''}">${d}${dot}</div>`;
  }
  return `<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--rsm);overflow:hidden">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border)">

      ${days.map(d=>`<div style="text-align:center;font-size:14px;color:var(--text3);padding-bottom:4px;font-weight:500">${d}</div>`).join('')}

    </div>
  </div>`;
}

function syncDelivItemsToArchive(p){
  if(!p){return;}
  const raw=p.delivItems||'';
  const items=raw.split(/[,\n·•\-\*]+/)
    .map(s=>s.replace(/^[\s→▶]+|[\s]+$/g,''))
    .filter(s=>s.length>1);
  if(!items.length){toast('목표 결과물을 먼저 입력하세요');return;}

  if(!p.workAreas) p.workAreas=[];
  let wa=p.workAreas.find(x=>x._autoGenerated);
  if(!wa){
    wa={id:uid(),name:'목표 결과물',deliverables:[],_autoGenerated:true};
    p.workAreas.unshift(wa);
  }

  const existing=new Set(wa.deliverables.map(d=>d.name));
  let added=0;
  items.forEach(name=>{
    if(!existing.has(name)){
      wa.deliverables.push({id:uid(),name,done:false,file:''});
      added++;
    }
  });

  saveToLS();

  if(added===0){
    toast('이미 모든 항목이 아카이브에 있습니다');
  } else {
    toast(`✅ ${added}개 항목이 결과물 아카이브에 추가됐습니다`);
    // 아카이브 탭이 열려있으면 즉시 반영
    const archiveEl=document.getElementById('proj-archive-content');
    if(archiveEl) archiveEl.innerHTML=projArchiveHTML(p);
  }
}

function cycleSchedStatus(pid,sid){
  const seq=['예정','진행중','검토중','완료'];
  const p=projects.find(x=>x.id===pid);
  const s=p?.schedules.find(x=>x.id===sid);
  if(!s)return;
  const prev=s.status;
  s.status=seq[(seq.indexOf(s.status)+1)%seq.length];
  logHistory(pid,'🔄',`"${s.name}" 상태 변경: ${prev} → ${s.status}`);
  saveToLS();
  const el=document.getElementById('sched-list');
  if(el) el.innerHTML=schedListHTML(p,COLORS[p.color]);
}

let _sDragPid=null,_sDragSid=null;
function schedDragStart(e,pid,sid){_sDragPid=pid;_sDragSid=sid;e.dataTransfer.effectAllowed='move';setTimeout(()=>e.currentTarget.style.opacity='.4',0);}
function schedDragEnd(e,pid){
  e.currentTarget.style.opacity='1';
  // persist new DOM order
  const list=document.getElementById('sched-list');
  if(!list)return;
  const p=projects.find(x=>x.id===pid);
  if(!p)return;
  const newOrder=[...list.querySelectorAll('[data-sid]')].map(el=>el.dataset.sid);
  p.schedules=newOrder.map(sid=>p.schedules.find(s=>s.id===sid)).filter(Boolean);
  saveToLS();_sDragPid=null;_sDragSid=null;
}
function schedDragOver(e){
  e.preventDefault();
  const dragging=document.querySelector('.sched-item[style*="opacity: 0.4"], .sched-item[style*="opacity:0.4"]');
  if(!dragging)return;
  const item=e.currentTarget;
  if(item===dragging)return;
  const rect=item.getBoundingClientRect();
  const list=item.parentNode;
  if(e.clientY<rect.top+rect.height/2) list.insertBefore(dragging,item);
  else item.after(dragging);
}

const TASK_KANBAN_COLS=[
  {key:'예정',   label:'예정',    cls:'st-pending', dot:'#EF9F27'},
  {key:'진행중', label:'진행중',  cls:'st-active',  dot:'#378ADD'},

];

function getTaskStatus(t){
  if(t.done) return '완료';
  if(t.taskStatus) return t.taskStatus;
  return '예정';
}

function taskKanbanHTML(p,s,c){
  const today=new Date();today.setHours(0,0,0,0);

  const cols=TASK_KANBAN_COLS.map(col=>{
    const tasks=s.tasks.filter(t=>getTaskStatus(t)===col.key);

    const cards=tasks.map(t=>{
      const diff=t.dueDate?Math.round((parseLocalDate(t.dueDate)-today)/864e5):null;
      let dueBadge='';
      if(diff!==null){
        const cls=t.done?'st-done':diff<0?'st-active':diff<=3?'st-pending':'st-done';
        const lbl=t.done?'완료':diff<0?`D+${-diff}`:diff===0?'오늘':`D-${diff}`;
        dueBadge=`<span class="sbadge ${cls}" style="font-size:14px;padding:2px 7px">${lbl}</span>`;
      }
      return `<div class="tk-card" draggable="true"
        ondragstart="tkDragStart(event,'${t.id}')"
        ondragend="tkDragEnd(event)">
        <div style="display:flex;align-items:flex-start;gap:7px;margin-bottom:8px">
          <div class="chk${t.done?' on':''}"
            onclick="toggleTaskStatus('${p.id}','${s.id}','${t.id}')"
            style="margin-top:1px;flex-shrink:0">${t.done?'✓':''}</div>
          <div style="font-size:14px;font-weight:500;color:var(--text);line-height:1.4;flex:1;${t.done?'text-decoration:line-through;color:var(--text3)':''}cursor:pointer" onclick="openSidePanel('${p.id}','${s.id}','${t.id}')">${t.name}</div>
        </div>
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
          ${t.meta?`<span style="font-size:14px;color:var(--text3)">${t.meta}</span>`:''}
          ${dueBadge}
        </div>
        ${t.dueDate?`<div style="font-size:14px;color:var(--text3);font-family:var(--mono);margin-top:5px">${t.dueDate}</div>`:''}
      </div>`;
    }).join('');

    return `<div class="tk-col"
      data-status="${col.key}"
      ondragover="event.preventDefault();this.classList.add('tk-drag-over')"
      ondragleave="this.classList.remove('tk-drag-over')"
      ondrop="tkDrop(event,'${p.id}','${s.id}','${col.key}')">
      <div class="tk-col-head">
        <div style="display:flex;align-items:center;gap:7px">
          <div style="width:8px;height:8px;border-radius:50%;background:${col.dot}"></div>
          <span class="tk-col-name">${col.label}</span>
        </div>
        <span class="tk-col-count">${tasks.length}</span>
      </div>
      <div class="tk-cards" id="tkcol-${col.key.replace(/[^a-z]/gi,'')}">${cards||`<div style="font-size:14px;color:var(--text3);padding:8px 4px;text-align:center">—</div>`}</div>
    </div>`;
  }).join('');

  return `<div class="tk-wrap">${cols}</div>
  <div style="margin-top:10px;font-size:14px;color:var(--text3);text-align:right">
    카드를 드래그해서 상태를 변경하거나, 체크박스로 완료 처리하세요
  </div>`;
}

// task kanban drag
let tkDragging=null;
function tkDragStart(e,tid){tkDragging=tid;e.currentTarget.style.opacity='.4';e.dataTransfer.effectAllowed='move';}
function tkDragEnd(e){e.currentTarget.style.opacity='1';document.querySelectorAll('.tk-col').forEach(el=>el.classList.remove('tk-drag-over'));}
function tkDrop(e,pid,sid,status){
  e.preventDefault();
  document.querySelectorAll('.tk-col').forEach(el=>el.classList.remove('tk-drag-over'));
  if(!tkDragging)return;
  const p=projects.find(x=>x.id===pid),s=p.schedules.find(x=>x.id===sid),t=s.tasks.find(x=>x.id===tkDragging);
  if(!t)return;
  if(status==='완료'){t.done=true;t.taskStatus='완료';}
  else{t.done=false;t.taskStatus=status;}
  tkDragging=null;
  saveToLS();
  automate(pid);
  document.getElementById('sched-view-body').innerHTML=taskKanbanHTML(p,s,COLORS[p.color]);
  const pb=document.getElementById('spbf');
  if(pb){const dc=s.tasks.filter(t=>t.done).length;pb.style.width=(s.tasks.length?Math.round(dc/s.tasks.length*100):0)+'%';}
  toast(`→ ${status}`);
}
function toggleTaskStatus(pid,sid,tid){
  const p=projects.find(x=>x.id===pid),s=p.schedules.find(x=>x.id===sid),t=s.tasks.find(x=>x.id===tid);
  if(!t)return;
  t.done=!t.done;
  t.taskStatus=t.done?'완료':(t.taskStatus==='완료'?'예정':t.taskStatus||'예정');
  if(!_autoRunning){_autoRunning=true;automate(pid);_autoRunning=false;}
  saveToLS();
  refreshTaskView(p,s);
}

// ── TASK TIMELINE ─────────────────────────────────────────────
function taskTimelineHTML(p,s,c){
  const tasks=s.tasks;
  if(!tasks.length) return '';

  // gather tasks with dates
  const dated=tasks.filter(t=>t.startDate||t.dueDate);
  const undated=tasks.filter(t=>!t.startDate&&!t.dueDate);

  if(!dated.length){
    return `<div style="background:var(--surface2);border-radius:var(--rsm);padding:14px 16px;margin-bottom:16px;text-align:center">
      <div style="font-size:14px;color:var(--text3)">태스크에 시작일/마감일을 입력하면 타임라인이 표시됩니다</div>
    </div>`;
  }

  // compute date range
  const allDates=[];
  dated.forEach(t=>{
    if(t.startDate) allDates.push(parseLocalDate(t.startDate));
    if(t.dueDate) allDates.push(parseLocalDate(t.dueDate));
  });
  const minD=new Date(Math.min(...allDates.map(d=>d.getTime())));
  const maxD=new Date(Math.max(...allDates.map(d=>d.getTime())));
  // extend range by half a day left, 1 day right for visual padding
  minD.setHours(minD.getHours()-12);
  maxD.setDate(maxD.getDate()+1);
  const totalMs=maxD.getTime()-minD.getTime();
  const totalDays=Math.round(totalMs/(1000*60*60*24));

  const today=new Date(); today.setHours(0,0,0,0);
  const todayPct=Math.max(0,Math.min(100,((today.getTime()-minD.getTime())/totalMs)*100));

  // generate day columns for header (show every N days)
  const step=Math.max(1,Math.ceil(totalDays/12));
  let dayCols='';
  for(let i=0;i<=totalDays;i+=step){
    const d=new Date(minD); d.setDate(d.getDate()+i);
    const isToday=d.toDateString()===today.toDateString();
    const label=`${d.getMonth()+1}/${d.getDate()}`;
    const pct=(i/totalDays)*100;
    dayCols+=`<div style="position:absolute;left:${pct}%;font-size:14px;color:${isToday?'var(--red)':'var(--text3)'};font-family:var(--mono);font-weight:${isToday?700:400};white-space:nowrap">${label}</div>`;
  }

  // rows
  const rows=dated.map(t=>{
    const sd=t.startDate?parseLocalDate(t.startDate):null;
    const ed=t.dueDate?parseLocalDate(t.dueDate):null;
    const ref=sd||ed;
    const lPct=sd?((sd.getTime()-minD.getTime())/totalMs)*100:((ed.getTime()-minD.getTime())/totalMs)*100;
    const rPct=ed?((ed.getTime()-minD.getTime())/totalMs)*100:lPct;
    const barL=Math.max(0,lPct);
    const barW=Math.max(1,rPct-lPct);

    // due status
    let dueClass='',dueLabel='';
    if(t.dueDate){
      const due=parseLocalDate(t.dueDate);due.setHours(0,0,0,0);
      const diff=Math.round((due.getTime()-today.getTime())/(1000*60*60*24));
      if(t.done){dueClass='tl-due-ok';dueLabel='완료';}
      else if(diff<0){dueClass='tl-due-late';dueLabel=`D+${-diff}`;}
      else if(diff<=3){dueClass='tl-due-warn';dueLabel=`D-${diff}`;}
      else{dueClass='tl-due-ok';dueLabel=`D-${diff}`;}
    }

    const barColor=t.done?'#a8a49e':c.dot;
    return `<div class="tl-row">
      <div class="tl-label">
        <div class="tl-chk${t.done?' on':''}" onclick="toggleTask('${p.id}','${s.id}','${t.id}')">${t.done?'✓':''}</div>
        <span class="tl-task-name${t.done?' done':''}" title="${t.name}">${t.name}</span>
      </div>
      <div class="tl-track">
        ${Array.from({length:Math.ceil(totalDays/step)+1},(_,i)=>{
          const pp=(i*step/totalDays)*100;
          return `<div class="tl-grid-line" style="left:${Math.min(100,pp)}%"></div>`;
        }).join('')}
        <div class="tl-today-line" style="left:${todayPct}%"></div>
        <div class="tl-bar" style="left:${barL}%;width:${barW}%;background:${barColor}" title="${t.name}${t.startDate?' · '+t.startDate:''}${t.dueDate?' → '+t.dueDate:''}">
          ${barW>8?t.name:''}
        </div>
        ${dueLabel?`<div class="tl-due-badge ${dueClass}" style="position:absolute;right:0">${dueLabel}</div>`:''}
      </div>
    </div>`;
  }).join('');

  const undatedRows=undated.map(t=>`<div class="tl-row" style="opacity:.5">
    <div class="tl-label">
      <div class="tl-chk${t.done?' on':''}" onclick="toggleTask('${p.id}','${s.id}','${t.id}')">${t.done?'✓':''}</div>
      <span class="tl-task-name${t.done?' done':''}">${t.name}</span>
    </div>
    <div class="tl-track" style="padding:0 8px">
      <div style="font-size:14px;color:var(--text3);font-style:italic">날짜 미입력</div>
    </div>
  </div>`).join('');

  return `<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--rsm);overflow:hidden;margin-bottom:${schedView==='both'?'20px':'0'}">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);background:var(--surface2)">
      <span style="font-size:14px;font-weight:700;color:var(--text2)">타임라인</span>
      <div style="display:flex;gap:10px;align-items:center;font-size:14px;color:var(--text3)">
        <span style="display:flex;align-items:center;gap:4px"><div style="width:10px;height:3px;background:${c.dot};border-radius:2px"></div>진행중</span>
        <span style="display:flex;align-items:center;gap:4px"><div style="width:10px;height:3px;background:#a8a49e;border-radius:2px"></div>완료</span>
        <span style="display:flex;align-items:center;gap:4px"><div style="width:1.5px;height:12px;background:var(--red)"></div>오늘</span>
      </div>
    </div>
    <div style="overflow-x:auto">
      <div style="min-width:520px">
        <div style="display:flex;padding-left:160px;height:26px;position:relative;border-bottom:1px solid var(--border);background:var(--surface2)">${dayCols}</div>
        ${rows}
        ${undatedRows}
      </div>
    </div>
  </div>`;
}

function taskListHTML(p,s){
  if(!s.tasks.length) return '<div class="empty">태스크가 없습니다</div>';
  const sorted=sortTasks(s.tasks, schedTaskSort);
  const today=new Date();today.setHours(0,0,0,0);
  return `<div class="task-list" id="task-list"
    ondragover="taskListDragOver(event)"
    ondrop="event.preventDefault()">${sorted.map(t=>{
    const today=new Date(); today.setHours(0,0,0,0);
    let dueInfo='';
    if(t.dueDate){
      const due=parseLocalDate(t.dueDate); due.setHours(0,0,0,0);
      const diff=Math.round((due.getTime()-today.getTime())/(1000*60*60*24));
      const cls=t.done?'tl-due-ok':diff<0?'tl-due-late':diff<=3?'tl-due-warn':'tl-due-ok';
      const label=t.done?'완료':diff<0?`D+${-diff}마감`:diff===0?'오늘마감':`D-${diff}`;
      dueInfo=`<span class="tl-due-badge ${cls}">${label}</span>`;
    }
    return `<div class="task-item" id="ti-${t.id}" data-tid="${t.id}" data-pid="${p.id}" data-sid="${s.id}">
      <div class="task-drag-handle" title="드래그로 순서 변경"
        draggable="true"
        ondragstart="taskDragStart(event,'${p.id}','${s.id}','${t.id}')"
        ondragend="taskDragEnd(event,'${p.id}','${s.id}')">⠿</div>
      <div class="chk${t.done?' on':''}" onclick="toggleTask('${p.id}','${s.id}','${t.id}')">${t.done?'✓':''}</div>
      <div style="flex:1;min-width:0">
        <div class="task-name${t.done?' done':''}"
          onclick="openSidePanel('${p.id}','${s.id}','${t.id}')"
          style="cursor:pointer" title="클릭해서 상세 보기">${t.name}</div>
        <div style="display:flex;gap:8px;align-items:center;margin-top:3px;flex-wrap:wrap">
          ${t.meta?`<span class="task-meta">${t.meta}</span>`:''}
          ${t.startDate||t.dueDate?`<span style="font-size:14px;color:var(--text3);font-family:var(--mono)">${t.startDate||''}${t.startDate&&t.dueDate?' → ':''}${t.dueDate||''}</span>`:''}
          ${dueInfo}
          ${(t.comments||[]).length?`<span style="font-size:14px;color:var(--text3)">💬 ${t.comments.length}</span>`:''}
        </div>
      </div>
      <button class="tdel" onclick="deleteTask('${p.id}','${s.id}','${t.id}')">✕</button>
    </div>`;
  }).join('')}</div>`;
}
// task list drag — handle is draggable, parent task-item moves
let _tDragId=null, _tDragEl=null;
function taskDragStart(e,pid,sid,tid){
  _tDragId=tid;
  _tDragEl=e.currentTarget.closest('.task-item');
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',tid);
  setTimeout(()=>{if(_tDragEl){_tDragEl.style.opacity='.35';_tDragEl.style.pointerEvents='none';}},0);
}
function taskDragEnd(e,pid,sid){
  if(_tDragEl){_tDragEl.style.opacity='1';_tDragEl.style.pointerEvents='';}
  const list=document.getElementById('task-list');if(!list)return;
  const p=projects.find(x=>x.id===pid);const s=p?.schedules.find(x=>x.id===sid);if(!s)return;
  const newOrder=[...list.querySelectorAll('[data-tid]')].map(el=>el.dataset.tid);
  s.tasks=newOrder.map(tid=>s.tasks.find(t=>t.id===tid)).filter(Boolean);
  saveToLS();_tDragId=null;_tDragEl=null;
}
function taskListDragOver(e){
  e.preventDefault();
  if(!_tDragEl)return;
  const items=[...e.currentTarget.querySelectorAll('.task-item')];
  let target=null,insertBefore=true;
  for(const item of items){
    if(item===_tDragEl)continue;
    const rect=item.getBoundingClientRect();
    if(e.clientY<rect.top+rect.height/2){target=item;insertBefore=true;break;}
    target=item;insertBefore=false;
  }
  if(target){if(insertBefore)e.currentTarget.insertBefore(_tDragEl,target);else target.after(_tDragEl);}
}

function addComment(pid,sid,tid){
  const inp=document.getElementById(`comment-input-${tid}`);

  if(!text)return;
  const p=projects.find(x=>x.id===pid),s=p?.schedules.find(x=>x.id===sid),t=s?.tasks.find(x=>x.id===tid);
  if(!t)return;
  if(!t.comments) t.comments=[];
  const now=new Date();
  t.comments.push({
    id:uid(),
    author:'김수경', // TODO: 로그인 연동 시 실제 사용자명으로
    text,
    time:now.toLocaleDateString('ko-KR',{month:'short',day:'numeric'})+' '+now.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}),
    ts:now.getTime()
  });
  inp.value='';

  const el=document.getElementById(`task-comments-${tid}`);
  if(el) el.outerHTML=`<div id="task-comments-${tid}" style="margin-bottom:10px">${t.comments.map(c=>`
    <div style="display:flex;gap:8px;margin-bottom:10px">

        <div style="font-size:14px;color:var(--text);line-height:1.6;background:var(--surface2);border-radius:var(--rsm);padding:7px 10px">${escHtml(c.text)}</div>

function deleteComment(pid,sid,tid,cid){
  const p=projects.find(x=>x.id===pid),s=p?.schedules.find(x=>x.id===sid),t=s?.tasks.find(x=>x.id===tid);
  if(!t)return;
  t.comments=(t.comments||[]).filter(c=>c.id!==cid);

  const modalEl=document.querySelector('.modal-box');

    if(el){const p2=projects.find(x=>x.id===pid);const s2=p2?.schedules.find(x=>x.id===sid);el.outerHTML=taskListHTML(p2,s2);}
  }

function syncGoalsFromTask(pid,tid,done){
  const p=projects.find(x=>x.id===pid);
  if(!p||!p.weeklyGoals)return;
  let changed=false;
  p.weeklyGoals.forEach(w=>{
    (w.goals||[]).forEach((g,gi)=>{
      if(typeof g==='object'&&g.taskId===tid&&g.projId===pid){
        w.goals[gi]={...g,done};
        changed=true;
      }
    });
  });
  if(changed){
    const el=document.getElementById('weekly-goals');
    if(el) el.innerHTML=weeklyGoalsHTML(p);
  }
}

function createRecurringTasks(pid,sid){
  const p=projects.find(x=>x.id===pid),s=p?.schedules.find(x=>x.id===sid);
  if(!s)return;
  const name=document.getElementById('rt-name').value.trim();
  const meta=document.getElementById('rt-meta').value;
  const freq=document.getElementById('rt-freq').value;
  const day=parseInt(document.getElementById('rt-day').value)||1;
  const start=document.getElementById('rt-start').value;
  const count=parseInt(document.getElementById('rt-count').value)||4;
  if(!name){toast('태스크명을 입력해주세요');return;}

  const startDate=new Date(start);
  let created=0;
  for(let i=0;i<count;i++){
    const d=new Date(startDate);
    if(freq==='monthly'){
      d.setMonth(d.getMonth()+i);
    } else {
      const interval=freq==='biweekly'?14:7;
      // 첫 번째 반복일 찾기
      if(i===0){
        const dow=d.getDay()||7;
        const diff=(day-dow+7)%7;
        d.setDate(d.getDate()+diff);
      } else {
        const base=new Date(startDate);
        const dow=base.getDay()||7;
        const diff=(day-dow+7)%7;
        base.setDate(base.getDate()+diff);
        d.setTime(base.getTime()+i*interval*864e5);
      }
    }
    const dueStr=d.toISOString().slice(0,10);
    s.tasks.push({id:uid(),name:`[반복] ${name}`,done:false,meta,dueDate:dueStr,startDate:'',taskStatus:'예정',recurring:true});
    created++;
  }
  saveToLS();closeModal();
  reRenderBlocks(pid);
  toast(`반복 태스크 ${created}개 생성됐습니다`);
}

// ⑤ 홈 섹션 드래그 순서 변경 (핸들 span에서 드래그)
let _hsDragging=null;
function homeSectionDragStart(e){
  _hsDragging=e.currentTarget.closest('.h-section');
  if(!_hsDragging)return;
  e.dataTransfer.effectAllowed='move';
  e.stopPropagation();
  setTimeout(()=>{if(_hsDragging){_hsDragging.style.opacity='.4';_hsDragging.style.pointerEvents='none';}},0);
}
function homeSectionDragEnd(e){
  if(_hsDragging){_hsDragging.style.opacity='1';_hsDragging.style.pointerEvents='';}
  _hsDragging=null;
  // 순서 저장
  const container=document.getElementById('home-sections');
  if(container){
    const order=[...container.querySelectorAll('.h-section')].map(s=>s.dataset.section).filter(Boolean);
    if(order.length) localStorage.setItem('spextrum_home_order', JSON.stringify(order));
  }
}
function homeSectionDragOver(e){
  e.preventDefault();
  if(!_hsDragging)return;
  const container=document.getElementById('home-sections');
  if(!container)return;
  const sections=[...container.querySelectorAll('.h-section')];
  let target=null,insertBefore=true;
  for(const sec of sections){
    if(sec===_hsDragging)continue;
    const rect=sec.getBoundingClientRect();
    if(e.clientY<rect.top+rect.height/2){target=sec;insertBefore=true;break;}
    target=sec;insertBefore=false;
  }
  if(target){if(insertBefore)container.insertBefore(_hsDragging,target);else target.after(_hsDragging);}
}

  if(!evs.length){
    // 일정 없어도 팝업 열어서 태스크 추가 가능하게

// ─── HOME MONTHLY CALENDAR ───────────────────────────────────
let homeCalYear=new Date().getFullYear();
let homeCalMonth=new Date().getMonth();

function shiftHomeCal(dir){
  homeCalMonth+=dir;
  if(homeCalMonth>11){homeCalMonth=0;homeCalYear++;}
  if(homeCalMonth<0){homeCalMonth=11;homeCalYear--;}
  renderHomeCal();
}

function renderHomeCal(){
  const el=document.getElementById('home-cal-body');
  const lbl=document.getElementById('home-cal-label');
  if(!el)return;
  const yr=homeCalYear,mo=homeCalMonth;
  const monthNames=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  if(lbl) lbl.textContent=yr+'년 '+monthNames[mo];

  const today=new Date();today.setHours(0,0,0,0);
  const first=new Date(yr,mo,1).getDay(); // 0=Sun
  const lastDay=new Date(yr,mo+1,0).getDate();
  const days=['일','월','화','수','목','금','토'];

  // Collect events for this month
  // Key: "YYYY-M-D" → [{type, label, color, pid, sid}]
  const events={};
  function addEv(d,ev){
    const k=yr+'-'+mo+'-'+d;
    if(!events[k])events[k]=[];
    events[k].push(ev);
  }

  // 1. Meetings
  (meetings||[]).forEach(m=>{
    if(!m||!m.date)return;
    const pts=m.date.split('.');
    if(pts.length<3)return;
    const my=parseInt(pts[0]),mm=parseInt(pts[1])-1,md=parseInt(pts[2]);
    if(my===yr&&mm===mo) addEv(md,{type:'meet',label:m.title||'',color:'#185fa5',bg:'#e6f1fb'});
  });

  // 1.5 오픈일자
  (projects||[]).filter(p=>p&&p.launchDate&&!p.archived).forEach(p=>{
    const d=parseLocalDate(p.launchDate);
    if(d&&d.getFullYear()===yr&&d.getMonth()===mo){
      const c=COLORS[p.color]||COLORS['teal'];
      addEv(d.getDate(),{type:'launch',label:`🚀 ${p.name}`,color:c.dot,bg:c.tag,proj:p.name,pid:p.id});
    }
  });

  // 2. Task due dates (all projects)
  (projects||[]).forEach(p=>{
    if(!p||!p.schedules)return;
    const c=COLORS[p.color]||COLORS['teal'];
    p.schedules.forEach(s=>{
      (s.tasks||[]).forEach(t=>{
        if(!t||!t.dueDate||t.done)return;
        const d=parseLocalDate(t.dueDate);
        if(d&&d.getFullYear()===yr&&d.getMonth()===mo)
          addEv(d.getDate(),{type:'task',label:t.name||'',color:c.dot,bg:c.tag,proj:p.name,pid:p.id,sid:s.id,tid:t.id});
      });
    });
  });

  // 3. Campaign dates
  (campaigns||[]).forEach(c=>{
    if(!c)return;
    // start date
    if(c.start){
      const pts=c.start.split('.');
      if(pts.length>=3){const cy=parseInt(pts[0]),cm=parseInt(pts[1])-1,cd=parseInt(pts[2]);
      if(cy===yr&&cm===mo) addEv(cd,{type:'camp',label:'▶ '+c.name,color:'#854f0b',bg:'#faeeda'});}
    }
    // end date
    if(c.end){
      const pts=c.end.split('.');
      const cy=parseInt(pts[0]),cm=parseInt(pts[1])-1,cd=parseInt(pts[2]);
      if(cy===yr&&cm===mo) addEv(cd,{type:'camp',label:'■ '+c.name,color:'#854f0b',bg:'#faeeda'});
    }
  });

  // Build grid
  const dowHdr=days.map((d,i)=>`<div style="text-align:center;font-size:14px;font-weight:600;color:${i===0?'#E24B4A':i===6?'#185fa5':'var(--text3)'};padding:8px 0">${d}</div>`).join('');

  let cells='';
  // prev month padding
  for(let i=0;i<first;i++) cells+=`<div style="background:var(--surface2);min-height:90px;border-right:1px solid var(--border);border-bottom:1px solid var(--border)"></div>`;

  for(let d=1;d<=lastDay;d++){
    const date=new Date(yr,mo,d);
    const dow=date.getDay();
    const isToday=today.getFullYear()===yr&&today.getMonth()===mo&&today.getDate()===d;
    const isSun=dow===0,isSat=dow===6;
    const evs=events[yr+'-'+mo+'-'+d]||[];
    const numColor=isToday?'#fff':isSun?'#E24B4A':isSat?'#185fa5':'var(--text)';
    const numBg=isToday?'#E24B4A':'transparent';

    const evChips=evs.slice(0,3).map(ev=>`
      <div style="font-size:14px;padding:2px 6px;border-radius:4px;background:${ev.bg};color:${ev.color};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;margin-bottom:2px;line-height:1.4"
        title="${ev.label}${ev.proj?' ('+ev.proj+')':''}"
        onclick="${ev.type==='task'&&ev.tid?`openSidePanel('${ev.pid}','${ev.sid}','${ev.tid}')`:ev.type==='launch'&&ev.pid?`openProj('${ev.pid}')`:ev.type==='meet'?'goHome()':ev.pid?`openProj('${ev.pid}')`:'goHome()'}">${ev.label}</div>`).join('');
    const moreChip=evs.length>3?`<div onclick="openCalDay(${yr},${mo},${d})" style="font-size:14px;color:#185fa5;padding:1px 6px;cursor:pointer;font-weight:600;background:#e6f1fb;border-radius:4px;display:inline-block" onmouseenter="this.style.opacity='.7'" onmouseleave="this.style.opacity='1'">+${evs.length-3}개 더보기</div>`:'';

    cells+=`<div style="background:var(--surface);min-height:90px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:6px;cursor:${evs.length?'pointer':'default'};${isToday?'box-shadow:inset 0 0 0 2px #E24B4A':''}">
      <div style="display:flex;justify-content:flex-end;margin-bottom:4px">
        <span onclick="openCalDay(${yr},${mo},${d})" style="width:22px;height:22px;border-radius:50%;background:${numBg};color:${numColor};font-size:14px;font-weight:${isToday?700:500};display:flex;align-items:center;justify-content:center;cursor:pointer">${d}</span>
      </div>
      ${evChips}${moreChip}
    </div>`;
  }

  // next month padding
  const total=first+lastDay;
  const rem=total%7===0?0:7-(total%7);
  for(let i=0;i<rem;i++) cells+=`<div style="background:var(--surface2);min-height:90px;border-right:1px solid var(--border);border-bottom:1px solid var(--border)"></div>`;

  // Build unified grid: header row + padding + cells all in one grid
  const dowHdrCells = days.map((d,i)=>`<div style="text-align:center;font-size:14px;font-weight:600;color:${i===0?'#E24B4A':i===6?'#185fa5':'var(--text3)'};padding:8px 0;background:var(--surface);border-bottom:2px solid var(--border2)">${d}</div>`).join('');

  el.innerHTML=`
    <div style="display:grid;grid-template-columns:repeat(7,minmax(0,1fr));border:1px solid var(--border);border-radius:var(--rsm);overflow:hidden">
      ${dowHdrCells}
      ${cells}
    </div>
    <div style="display:flex;gap:14px;flex-wrap:wrap;padding:12px 4px 0;font-size:14px;color:var(--text3)">
      <span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;border-radius:2px;background:#e6f1fb;border:1px solid #185fa5;display:inline-block"></span>회의</span>
      <span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;border-radius:2px;background:#faeeda;border:1px solid #854f0b;display:inline-block"></span>캠페인</span>
      <span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;border-radius:2px;background:#f0ede8;display:inline-block"></span>태스크 마감</span>
    </div>`;
}

// GANTT
// Parse "YYYY-MM-DD" as local midnight (not UTC) to avoid timezone offset
function parseLocalDate(s){
  if(!s) return null;
  const m=s.match(/(\d{4})-(\d{2})-(\d{2})/);
  if(!m) return null;
  const d=new Date(+m[1],+m[2]-1,+m[3]); // local midnight, no UTC shift
  return d;
}
let homeTimelineView='year';
function setHomeTimeline(v){
  homeTimelineView=v;
  const el=document.getElementById('home-timeline');
  if(!el)return;
  el.innerHTML=v==='week'?weeklyGanttHTML():ganttHTML();
  document.querySelectorAll('.h-section .tb-vbtn').forEach(btn=>{
    btn.classList.toggle('on',btn.textContent.trim().startsWith(v==='week'?'주간':'연간'));
  });
}

function ganttHTML(){
  const months=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const LABEL_W=140, COL_W=52, TOTAL_W=COL_W*12;
  const RS=new Date('2026-01-01').getTime();
  const RE=new Date('2026-12-31T23:59:59').getTime();
  const TOTAL=RE-RS;

  // 날짜 → px 변환 (COL_W*12 기준)
  function dateToPx(ms){ return Math.max(0,Math.min(TOTAL_W,((ms-RS)/TOTAL)*TOTAL_W)); }
  function pm(s){if(!s)return null;const m=s.match(/(\d{4})\.(\d{2})/);return m?new Date(+m[1],+m[2]-1,1).getTime():null}

  const todayPx=dateToPx(new Date().getTime());

  const header=`<div style="display:flex;border-bottom:1px solid var(--border)">
    <div style="width:${LABEL_W}px;flex-shrink:0;position:sticky;left:0;background:var(--surface);z-index:3;border-right:1px solid var(--border)"></div>
    ${months.map(m=>`<div style="width:${COL_W}px;flex-shrink:0;font-size:14px;color:var(--text3);font-family:var(--mono);padding:7px 0 5px;text-align:center;border-right:1px solid var(--border)">${m}</div>`).join('')}
  </div>`;

  const rows=projects.filter(p=>!p.archived).map(p=>{
    const c=COLORS[p.color],s=pm(p.start),e=pm(p.end);
    let bar='';
    if(s&&e){
      const l=dateToPx(s);
      const r=dateToPx(e);
      const w=Math.max(COL_W-4, r-l);
      bar=`<div onclick="openProj('${p.id}')" title="${p.name}" style="position:absolute;left:${l}px;width:${w}px;height:20px;border-radius:4px;background:${c.dot};display:flex;align-items:center;padding:0 8px;font-size:14px;color:#fff;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;z-index:1;transition:opacity .15s" onmouseenter="this.style.opacity='.8'" onmouseleave="this.style.opacity='1'">${p.name}</div>`;
    }
    return `<div style="display:flex;align-items:center;border-bottom:1px solid var(--border);min-height:38px">
      <div style="width:${LABEL_W}px;flex-shrink:0;position:sticky;left:0;background:var(--surface);z-index:2;border-right:1px solid var(--border)">
        <div style="font-size:14px;font-weight:500;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 8px;cursor:pointer" onclick="openProj('${p.id}')" title="${p.name}">${p.name}</div>
      </div>
      <div style="width:${TOTAL_W}px;flex-shrink:0;position:relative;height:38px;display:flex;align-items:center">
        ${months.map((_,i)=>`<div style="position:absolute;top:0;bottom:0;left:${i*COL_W}px;width:1px;background:var(--border)"></div>`).join('')}
        <div style="position:absolute;top:0;bottom:0;left:${todayPx}px;width:1.5px;background:#E24B4A;z-index:2"></div>
        ${bar}
      </div>
    </div>`;
  }).join('');
  return `<div style="overflow-x:auto"><div style="min-width:${LABEL_W+TOTAL_W}px">${header}${rows}</div></div>`;
}

function weeklyGanttHTML(){
  // Determine week range: Mon–Sun of current week
  const now=new Date();
  const day=now.getDay(); // 0=Sun
  const diffToMon=day===0?-6:1-day;
  const mon=new Date(now);mon.setDate(now.getDate()+diffToMon);mon.setHours(0,0,0,0);
  const sun=new Date(mon);sun.setDate(mon.getDate()+6);sun.setHours(23,59,59,999);

  // Build 7 day columns
  const days=['일','월','화','수','목','금','토'];
  const dateLabels=Array.from({length:7},(_,i)=>{
    const d=new Date(mon);d.setDate(mon.getDate()+i);
    return d;
  });
  const LABEL_W=160;
  const COL_W=110; // px per day
  const TOTAL_W=LABEL_W+COL_W*7;

  const today=new Date();today.setHours(0,0,0,0);
  const todayIdx=dateLabels.findIndex(d=>d.toDateString()===today.toDateString());

  // Header row
  const headerCols=dateLabels.map((d,i)=>{
    const isToday=i===todayIdx;
    const dotw=days[d.getDay()];
    const isSun=d.getDay()===0;const isSat=d.getDay()===6;
    const color=isToday?'#fff':isSun?'#E24B4A':isSat?'#185fa5':'var(--text3)';
    const bg=isToday?'#E24B4A':'var(--surface2)';
    return `<div style="width:${COL_W}px;flex-shrink:0;text-align:center;padding:7px 4px;border-right:1px solid var(--border);background:${bg}">
      <div style="font-size:14px;color:${isToday?'rgba(255,255,255,.8)':color};font-weight:500">${dotw}</div>
      <div style="font-size:14px;font-weight:700;color:${color};font-family:var(--mono);margin-top:1px">${d.getDate()}</div>
    </div>`;
  }).join('');
  const header=`<div style="display:flex;border-bottom:2px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:3">
    <div style="width:${LABEL_W}px;flex-shrink:0;padding:7px 12px;font-size:14px;color:var(--text3);font-weight:600;display:flex;align-items:flex-end">
      ${mon.getMonth()+1}월 ${Math.ceil(mon.getDate()/7)}주
    </div>
    ${headerCols}
  </div>`;

  // Rows: per project → per schedule → per task
  const rows=projects.map(p=>{
    const c=COLORS[p.color];

    // collect tasks that fall in this week (by dueDate or startDate)
    const weekTasks=[];
    p.schedules.forEach(s=>{
      s.tasks.forEach(t=>{
        const sd=t.startDate?parseLocalDate(t.startDate):null;
        const ed=t.dueDate?parseLocalDate(t.dueDate):null;
        // include if dueDate in week, or startDate in week, or spans week
        const inWeek=(sd&&sd<=sun&&(!ed||ed>=mon))||(ed&&ed>=mon&&ed<=sun)||(sd&&sd>=mon&&sd<=sun);
        if(inWeek) weekTasks.push({...t,schedId:s.id,schedName:s.name});
      });
    });

    if(!weekTasks.length){
      // Project bar with no tasks this week — show muted row
      return `<div style="display:flex;align-items:center;border-bottom:1px solid var(--border);min-height:36px;opacity:.45">
        <div style="width:${LABEL_W}px;flex-shrink:0;padding:0 12px;display:flex;align-items:center;gap:7px">
          <div style="width:7px;height:7px;border-radius:50%;background:${c.dot}"></div>
          <span style="font-size:14px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.name}</span>
        </div>
        <div style="flex:1;display:flex">
          ${dateLabels.map((_,i)=>`<div style="width:${COL_W}px;flex-shrink:0;border-right:1px solid var(--border);${i===todayIdx?'background:rgba(226,75,74,.04)':''}"></div>`).join('')}
        </div>
      </div>`;
    }

    // Project header row
    const projRow=`<div style="display:flex;align-items:center;border-bottom:1px solid var(--border);min-height:34px;background:var(--surface2)">
      <div style="width:${LABEL_W}px;flex-shrink:0;padding:0 12px;display:flex;align-items:center;gap:7px">
        <div style="width:8px;height:8px;border-radius:50%;background:${c.dot}"></div>
        <span style="font-size:14px;font-weight:700;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer" onclick="openProj('${p.id}')">${p.name}</span>
      </div>
      <div style="flex:1;display:flex">
        ${dateLabels.map((_,i)=>`<div style="width:${COL_W}px;flex-shrink:0;border-right:1px solid var(--border);${i===todayIdx?'background:rgba(226,75,74,.06)':''}"></div>`).join('')}
      </div>
    </div>`;

    // Task rows
    const taskRows=weekTasks.map(t=>{
      const sd=t.startDate?parseLocalDate(t.startDate):null;
      const ed=t.dueDate?parseLocalDate(t.dueDate):null;

      // compute bar span (clamp to week)
      const barStart=sd?Math.max(0,(sd-mon)/864e5):0;
      const barEnd=ed?Math.min(7,(ed-mon)/864e5+1):barStart+1;
      const barLeft=Math.round(barStart*COL_W);
      const barWidth=Math.max(COL_W-4,Math.round((barEnd-barStart)*COL_W)-4);

      const diff=ed?Math.round((ed-today)/864e5):null;
      let badgeColor=c.dot;
      if(diff!==null&&!t.done){
        if(diff<0) badgeColor='#E24B4A';
        else if(diff<=1) badgeColor='#E24B4A';
        else if(diff<=3) badgeColor='#EF9F27';
      }
      if(t.done) badgeColor='#a8a49e';

      const bar=`<div style="position:absolute;left:${barLeft}px;width:${barWidth}px;height:22px;border-radius:4px;background:${badgeColor};display:flex;align-items:center;padding:0 8px;z-index:1;top:50%;transform:translateY(-50%);cursor:pointer;transition:opacity .15s;overflow:hidden"
        onclick="openSidePanel('${p.id}','${t.schedId}','${t.id}')"
        onmouseenter="this.style.opacity='.8'" onmouseleave="this.style.opacity='1'"
        title="${t.name}${t.meta?' · '+t.meta:''}${ed?' · '+t.dueDate:''}">
        <span style="font-size:14px;color:#fff;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${t.name}</span>
      </div>`;

      return `<div style="position:relative;display:flex;align-items:center;border-bottom:1px solid var(--border);min-height:36px" onmouseenter="this.style.background='var(--surface2)'" onmouseleave="this.style.background=''">
        <div style="width:${LABEL_W}px;flex-shrink:0;padding:0 8px 0 24px;display:flex;align-items:center;gap:7px">
          <div class="chk${t.done?' on':''}" onclick="pkToggleTask('${p.id}','${t.schedId}','${t.id}')" style="flex-shrink:0">${t.done?'✓':''}</div>
          <div style="flex:1;min-width:0;cursor:pointer" onclick="openSidePanel('${p.id}','${t.schedId}','${t.id}')">
            <div style="font-size:14px;color:var(--text);${t.done?'text-decoration:line-through;color:var(--text3)':''}overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.name}</div>
            ${t.meta?`<div style="font-size:14px;color:var(--text3)">${t.meta}</div>`:''}
          </div>
        </div>
        <div style="width:${COL_W*7}px;flex-shrink:0;position:relative;height:36px">
          ${dateLabels.map((_,i)=>`<div style="position:absolute;left:${i*COL_W}px;top:0;bottom:0;width:${COL_W}px;border-right:1px solid var(--border);${i===todayIdx?'background:rgba(226,75,74,.04)':''}"></div>`).join('')}
          ${bar}
        </div>
      </div>`;
    }).join('');

    return projRow+taskRows;
  }).join('');

  // Week nav
  const prevMon=new Date(mon);prevMon.setDate(mon.getDate()-7);
  const nextMon=new Date(mon);nextMon.setDate(mon.getDate()+7);
  const prevStr=`${prevMon.getFullYear()}-${String(prevMon.getMonth()+1).padStart(2,'0')}-${String(prevMon.getDate()).padStart(2,'0')}`;
  const nextStr=`${nextMon.getFullYear()}-${String(nextMon.getMonth()+1).padStart(2,'0')}-${String(nextMon.getDate()).padStart(2,'0')}`;

  return `<div style="min-width:${TOTAL_W}px">
    <div style="display:flex;align-items:center;gap:8px;padding:8px 0 4px">
      <button class="btn xs ghost" onclick="shiftWeeklyGantt('${prevStr}')">‹ 이전 주</button>
      <button class="btn xs ghost" onclick="setHomeTimeline('week')">오늘</button>
      <button class="btn xs ghost" onclick="shiftWeeklyGantt('${nextStr}')">다음 주 ›</button>
      <span style="font-size:14px;color:var(--text3);margin-left:6px">${mon.getMonth()+1}/${mon.getDate()} – ${sun.getMonth()+1}/${sun.getDate()} · 이번 주 마감 태스크 표시</span>
    </div>
    ${header}
    ${rows||'<div class="empty" style="padding:20px">이번 주 마감 태스크가 없습니다</div>'}
  </div>`;
}

function shiftWeeklyGantt(mondayDateStr){
  // Temporarily override "today" for the weekly gantt by shifting
  // We re-render with a fake anchor by monkey-patching Date — instead,
  // store the offset in a variable
  _weekOffset=(new Date(mondayDateStr)-new Date(new Date().setHours(0,0,0,0)-((new Date().getDay()||7)-1)*864e5))/864e5/7;
  const el=document.getElementById('home-timeline');
  if(el) el.innerHTML=weeklyGanttHTMLOffset(_weekOffset);
}
let _weekOffset=0;

function weeklyGanttHTMLOffset(offset){
  // Temporarily shift Date.now by offset weeks
  if(!offset) return weeklyGanttHTML();
  const orig=Date.prototype.getTime;
  // Simpler: just pass offset into a parameter version
  return weeklyGanttHTMLWithOffset(offset);
}

function weeklyGanttHTMLWithOffset(weekOffset){
  const nowShifted=new Date(Date.now()+Math.round(weekOffset)*7*864e5);
  const day=nowShifted.getDay();
  const diffToMon=day===0?-6:1-day;
  const mon=new Date(nowShifted);mon.setDate(nowShifted.getDate()+diffToMon);mon.setHours(0,0,0,0);
  const sun=new Date(mon);sun.setDate(mon.getDate()+6);sun.setHours(23,59,59,999);
  const days=['일','월','화','수','목','금','토'];
  const dateLabels=Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});
  const LABEL_W=160,COL_W=110,TOTAL_W=LABEL_W+COL_W*7;
  const today=new Date();today.setHours(0,0,0,0);
  const todayIdx=dateLabels.findIndex(d=>d.toDateString()===today.toDateString());

  const headerCols=dateLabels.map((d,i)=>{
    const isToday=i===todayIdx;
    const dotw=days[d.getDay()];
    const isSun=d.getDay()===0;const isSat=d.getDay()===6;
    const color=isToday?'#fff':isSun?'#E24B4A':isSat?'#185fa5':'var(--text3)';
    const bg=isToday?'#E24B4A':'var(--surface2)';
    return `<div style="width:${COL_W}px;flex-shrink:0;text-align:center;padding:7px 4px;border-right:1px solid var(--border);background:${bg}">
      <div style="font-size:14px;color:${isToday?'rgba(255,255,255,.8)':color};font-weight:500">${dotw}</div>
      <div style="font-size:14px;font-weight:700;color:${color};font-family:var(--mono);margin-top:1px">${d.getDate()}</div>
    </div>`;
  }).join('');
  const header=`<div style="display:flex;border-bottom:2px solid var(--border);position:sticky;top:0;z-index:5;background:var(--surface)">
    <div style="width:${LABEL_W}px;flex-shrink:0;position:sticky;left:0;z-index:6;background:var(--surface);border-right:1px solid var(--border);padding:7px 12px;font-size:14px;color:var(--text3);font-weight:600;display:flex;align-items:flex-end">
      ${mon.getMonth()+1}월 ${Math.ceil(mon.getDate()/7)}주
    </div>${headerCols}</div>`;

  const rows=projects.map(p=>{
    const c=COLORS[p.color];
    const weekTasks=[];
    p.schedules.forEach(s=>s.tasks.forEach(t=>{
      const sd=t.startDate?parseLocalDate(t.startDate):null;
      const ed=t.dueDate?parseLocalDate(t.dueDate):null;
      const inWeek=(sd&&sd<=sun&&(!ed||ed>=mon))||(ed&&ed>=mon&&ed<=sun)||(sd&&sd>=mon&&sd<=sun);
      if(inWeek) weekTasks.push({...t,schedId:s.id,schedName:s.name});
    }));
    if(!weekTasks.length) return `<div style="display:flex;align-items:center;border-bottom:1px solid var(--border);min-height:34px;opacity:.4">
      <div style="width:${LABEL_W}px;flex-shrink:0;position:sticky;left:0;background:var(--surface);z-index:2;padding:0 12px;display:flex;align-items:center;gap:7px;border-right:1px solid var(--border)">
        <div style="width:7px;height:7px;border-radius:50%;background:${c.dot}"></div>
        <span style="font-size:14px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.name}</span>
      </div>
      <div style="flex:1;display:flex">${dateLabels.map((_,i)=>`<div style="width:${COL_W}px;flex-shrink:0;border-right:1px solid var(--border);${i===todayIdx?'background:rgba(226,75,74,.04)':''}"></div>`).join('')}</div>
    </div>`;

    const projRow=`<div style="display:flex;align-items:center;border-bottom:1px solid var(--border);min-height:34px;background:var(--surface2)">
      <div style="width:${LABEL_W}px;flex-shrink:0;position:sticky;left:0;background:var(--surface2);z-index:2;padding:0 12px;display:flex;align-items:center;gap:7px;border-right:1px solid var(--border)">
        <div style="width:8px;height:8px;border-radius:50%;background:${c.dot}"></div>
        <span style="font-size:14px;font-weight:700;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer" onclick="openProj('${p.id}')">${p.name}</span>
      </div>
      <div style="flex:1;display:flex">${dateLabels.map((_,i)=>`<div style="width:${COL_W}px;flex-shrink:0;border-right:1px solid var(--border);${i===todayIdx?'background:rgba(226,75,74,.06)':''}"></div>`).join('')}</div>
    </div>`;

    const taskRows=weekTasks.map(t=>{
      const sd=t.startDate?parseLocalDate(t.startDate):null;
      const ed=t.dueDate?parseLocalDate(t.dueDate):null;
      const barStart=sd?Math.max(0,(sd-mon)/864e5):0;
      const barEnd=ed?Math.min(7,(ed-mon)/864e5+1):barStart+1;
      const barLeft=Math.round(barStart*COL_W);
      const barWidth=Math.max(COL_W-4,Math.round((barEnd-barStart)*COL_W)-4);
      const diff=ed?Math.round((ed-today)/864e5):null;
      let bc=c.dot;
      if(diff!==null&&!t.done){if(diff<0||diff<=1)bc='#E24B4A';else if(diff<=3)bc='#EF9F27';}
      if(t.done)bc='#a8a49e';
      return `<div style="position:relative;display:flex;align-items:center;border-bottom:1px solid var(--border);min-height:36px" onmouseenter="this.style.background='var(--surface2)'" onmouseleave="this.style.background=''">
        <div style="width:${LABEL_W}px;flex-shrink:0;position:sticky;left:0;background:inherit;z-index:2;padding:0 8px 0 24px;display:flex;align-items:center;gap:7px;border-right:1px solid var(--border)">
          <div class="chk${t.done?' on':''}" onclick="pkToggleTask('${p.id}','${t.schedId}','${t.id}')" style="flex-shrink:0">${t.done?'✓':''}</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:14px;color:var(--text);${t.done?'text-decoration:line-through;color:var(--text3);':''}overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.name}</div>
            ${t.meta?`<div style="font-size:14px;color:var(--text3)">${t.meta}</div>`:''}
          </div>
        </div>
        <div style="width:${COL_W*7}px;flex-shrink:0;position:relative;height:36px">
          ${dateLabels.map((_,i)=>`<div style="position:absolute;left:${i*COL_W}px;top:0;bottom:0;width:${COL_W}px;border-right:1px solid var(--border);${i===todayIdx?'background:rgba(226,75,74,.04)':''}"></div>`).join('')}
          <div style="position:absolute;left:${barLeft}px;width:${barWidth}px;height:22px;border-radius:4px;background:${bc};display:flex;align-items:center;padding:0 8px;z-index:1;top:50%;transform:translateY(-50%);cursor:pointer;overflow:hidden"
            onclick="openSched('${p.id}','${t.schedId}')"
            onmouseenter="this.style.opacity='.8'" onmouseleave="this.style.opacity='1'"
            title="${t.name}${t.meta?' · '+t.meta:''}${t.dueDate?' · '+t.dueDate:''}">
            <span style="font-size:14px;color:#fff;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${t.name}</span>
          </div>
        </div>
      </div>`;
    }).join('');
    return projRow+taskRows;
  }).join('');

  const prevW=weekOffset-1,nextW=weekOffset+1;
  const scrollLeft=Math.max(0,LABEL_W+todayIdx*COL_W-100);
  const ganttInner=`<div style="overflow-x:auto" id="weekly-gantt-scroll">
    <div style="min-width:${TOTAL_W}px">
      ${header}
      ${rows||'<div class="empty" style="padding:20px">이번 주 해당하는 태스크가 없습니다<br><span style="font-size:14px">태스크에 시작일/마감일을 입력하면 여기에 표시됩니다</span></div>'}
    </div>
  </div>`;
  if(todayIdx>=0){
    setTimeout(()=>{
      const el=document.getElementById('weekly-gantt-scroll');
      if(el) el.scrollLeft=scrollLeft;
    },80);
  }
  return `<div>
    <div style="display:flex;align-items:center;gap:8px;padding:8px 0 4px">
      <button class="btn xs ghost" onclick="_weekOffset=${prevW};document.getElementById('home-timeline').innerHTML=weeklyGanttHTMLWithOffset(${prevW})">‹ 이전 주</button>
      <button class="btn xs ghost" onclick="_weekOffset=0;setHomeTimeline('week')">오늘</button>
      <button class="btn xs ghost" onclick="_weekOffset=${nextW};document.getElementById('home-timeline').innerHTML=weeklyGanttHTMLWithOffset(${nextW})">다음 주 ›</button>
      <span style="font-size:14px;color:var(--text3);margin-left:6px">${mon.getMonth()+1}/${mon.getDate()} – ${sun.getMonth()+1}/${sun.getDate()}</span>
    </div>
    ${ganttInner}
  </div>`;
}

// MEETING
function homeUrgencyHTML(){
  const today=new Date();today.setHours(0,0,0,0);
  const allTasks=[];
  projects.filter(p=>!p.archived).forEach(p=>
    p.schedules.forEach(s=>s.tasks.forEach(t=>
      allTasks.push({...t,projName:p.name,projId:p.id,schedId:s.id,projColor:p.color})
    ))
  );
  const overdue=allTasks.filter(t=>!t.done&&t.dueDate&&parseLocalDate(t.dueDate)<today)
    .sort((a,b)=>parseLocalDate(a.dueDate)-parseLocalDate(b.dueDate));
  const soon=allTasks.filter(t=>{
    if(t.done||!t.dueDate)return false;
    const d=Math.round((parseLocalDate(t.dueDate)-today)/864e5);
    return d>=0&&d<=3;
  }).sort((a,b)=>parseLocalDate(a.dueDate)-parseLocalDate(b.dueDate));

  if(!overdue.length&&!soon.length)
    return `<div style="padding:14px 20px;font-size:14px;color:var(--text3)">✅ 긴급 태스크 없음</div>`;

  const renderTask=(t,type)=>{
    const c=COLORS[t.projColor];
    const d=t.dueDate?Math.round((parseLocalDate(t.dueDate)-today)/864e5):null;
    const badge=type==='overdue'
      ?`<span style="font-size:14px;background:#fdf2f2;color:#E24B4A;padding:2px 7px;border-radius:4px;flex-shrink:0">D+${-d}</span>`
      :`<span style="font-size:14px;background:#faeeda;color:#854f0b;padding:2px 7px;border-radius:4px;flex-shrink:0">${d===0?'오늘':`D-${d}`}</span>`;
    return `<div onclick="openSidePanel('${t.projId}','${t.schedId}','${t.id}')"
      style="display:flex;align-items:center;gap:10px;padding:8px 20px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s"
      onmouseenter="this.style.background='var(--surface2)'" onmouseleave="this.style.background=''">
      <div class="chk${t.done?' on':''}" onclick="event.stopPropagation();pkToggleTask('${t.projId}','${t.schedId}','${t.id}')">${t.done?'✓':''}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:14px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.name}</div>
        <div style="font-size:14px;color:var(--text3);margin-top:1px">
          <span style="background:${c.tag};color:${c.tagT};padding:1px 6px;border-radius:4px;font-size:14px">${t.projName}</span>
          ${t.meta?`<span style="margin-left:6px">${t.meta}</span>`:''}
        </div>
      </div>
      ${badge}

function homeMetricsHTML(){
  const today=new Date();today.setHours(0,0,0,0);
  const allTasks=[];

      allTasks.push({...t,projName:p.name})
    ))
  );
  const total=allTasks.length;
  const done=allTasks.filter(t=>t.done).length;
  const overdue=allTasks.filter(t=>!t.done&&t.dueDate&&parseLocalDate(t.dueDate)<today).length;
  const completionRate=total?Math.round(done/total*100):0;

  // 마감 준수율 — 완료된 태스크 중 due date 있었던 것
  const doneWithDue=allTasks.filter(t=>t.done&&t.dueDate);
  // 마감 준수율은 추적 데이터가 없으면 추정 불가
  const onTimeEst=doneWithDue.length;

  // 프로젝트별 완료율
  const projStats=projects.filter(p=>!p.archived).map(p=>{
    const t=p.schedules.flatMap(s=>s.tasks);
    const d=t.filter(x=>x.done).length;
    return {name:p.name,total:t.length,done:d,rate:t.length?Math.round(d/t.length*100):0,color:COLORS[p.color]};
  }).sort((a,b)=>b.rate-a.rate);

  // 파트별 미완료
  const partMap={};
  allTasks.filter(t=>!t.done).forEach(t=>{
    const names=(t.meta||'').split(/[,·\s]+/).filter(s=>s.length>1);
    names.forEach(n=>{
      const dept=MEMBER_DEPT[n]||'기타';
      partMap[dept]=(partMap[dept]||0)+1;

  });

  return `<div style="padding:0 20px 16px;display:grid;grid-template-columns:1fr 1fr;gap:20px">
    <!-- 전체 완료율 -->

        <div style="font-size:32px;font-weight:700;color:var(--text);font-family:var(--mono);line-height:1">${completionRate}%</div>
        <div style="font-size:14px;color:var(--text3);padding-bottom:4px">${done}/${total} 완료</div>
      </div>
      <div style="height:6px;background:var(--surface2);border-radius:3px;overflow:hidden">
        <div style="height:100%;width:${completionRate}%;background:#27ae60;border-radius:3px;transition:width .5s"></div>
      </div>
      ${overdue?`<div style="font-size:14px;color:#E24B4A;margin-top:6px">⚠️ 초과 ${overdue}건 포함</div>`:''}
    </div>

    <!-- 파트별 미완료 -->
    <div>
      <div style="font-size:14px;font-weight:600;color:var(--text3);margin-bottom:10px">파트별 미완료</div>
      ${Object.entries(partMap).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([dept,cnt])=>`
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">
          <div style="font-size:14px;color:var(--text2);width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${dept}</div>
          <div style="flex:1;height:5px;background:var(--surface2);border-radius:3px">
            <div style="height:100%;width:${Math.round(cnt/Math.max(...Object.values(partMap))*100)}%;background:#378ADD;border-radius:3px"></div>
          </div>
          <div style="font-size:14px;color:var(--text3);font-family:var(--mono);width:20px;text-align:right">${cnt}</div>
        </div>`).join('')}
    </div>

    <!-- 프로젝트별 완료율 -->
    <div style="grid-column:1/-1">
      <div style="font-size:14px;font-weight:600;color:var(--text3);margin-bottom:10px">프로젝트별 완료율</div>
      <div style="display:flex;flex-direction:column;gap:5px">
        ${projStats.map(p=>`
          <div style="display:flex;align-items:center;gap:8px;cursor:pointer" onclick="openProj('${projects.find(x=>x.name===p.name)?.id||''}')">
            <div style="font-size:14px;color:var(--text2);width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.name}</div>

function meetListHTML(){

  return [...list].sort((a,b)=>a.date.localeCompare(b.date)).map(m=>{

    const mon=(pts[1]||'').replace(/^0/,'')+'월',day=(pts[2]||'').replace(/^0/,'');

    const syncBtnHtml=gcConnected
      ?`<button class="sync-btn${synced?' synced':''}" onclick="event.stopPropagation();${synced?`removeMeetingFromCalendar('${m.id}')`:`syncMeetingToCalendar('${m.id}')`}" title="${synced?'캘린더에서 제거':'캘린더에 추가'}">${synced?'📅 동기화됨':'+ 캘린더'}</button>`

async function calFetch(method,path,body){
  // calId에 @ 포함된 경우 자동 인코딩
  const encodedPath=path.replace(/\/calendars\/([^/]+)\//g,(match,calId)=>{
    return `/calendars/${encodeURIComponent(calId)}/`;
  });
  const res=await fetch('https://www.googleapis.com/calendar/v3'+encodedPath,{
    method,headers:{'Authorization':'Bearer '+gcToken,'Content-Type':'application/json'},
    body:body?JSON.stringify(body):undefined
  });
  if(res.status===401){gcConnected=false;gcToken=null;updateCalNavDot();toast('세션이 만료됐습니다. 다시 연결해주세요.');return null}
  return res.status===204?{}:res.json();
}

// ─── GOOGLE DRIVE SYNC ───────────────────────────────────────
const DRIVE_FILE_NAME = 'spextrum_data.json';
let driveFileId = null;
let driveSyncing = false;
let driveLastSaved = null;

async function driveFetch(method, path, body, contentType){
  if(!gcToken) return null;
  const res = await fetch('https://www.googleapis.com'+path, {
    method,
    headers:{
      'Authorization':'Bearer '+gcToken,
      ...(contentType?{'Content-Type':contentType}:{})
    },
    body: body || undefined
  });
  if(res.status===401){gcConnected=false;gcToken=null;updateCalNavDot();return null;}
  if(res.status===204||res.status===200&&res.headers.get('content-length')==='0') return {};
  try{ return await res.json(); }catch(e){ return {}; }
}

async function driveFindFile(){
  const res = await driveFetch('GET',
    `/drive/v3/files?q=name%3D%27${DRIVE_FILE_NAME}%27%20and%20trashed%3Dfalse&spaces=drive&fields=files(id,name,modifiedTime)`);
  if(!res||!res.files) return null;
  return res.files[0]||null;
}

async function driveLoadData(){
  if(!gcToken){toast('먼저 Google 연동을 해주세요');return;}
  driveSyncing=true; updateDriveStatus('loading');
  try{
    const file = await driveFindFile();
    if(!file){
      // Drive에 파일 없음 — 현재 로컬 데이터 업로드
      toast('Drive에 기존 파일이 없습니다. 현재 데이터를 업로드합니다.');
      await driveSaveData(true);
      return;
    }
    driveFileId = file.id;
    const driveModified = new Date(file.modifiedTime);

    // Firebase/로컬 데이터가 Drive보다 최신이면 Drive에 덮어쓰기
    const localSaved = driveLastSaved || new Date(0);
    if(localSaved > driveModified){
      toast('로컬 데이터가 더 최신입니다. Drive에 업로드합니다...');
      await driveSaveData(true);
      return;
    }

    // Drive 데이터가 더 최신인 경우만 불러오기
    const res = await fetch(`https://www.googleapis.com/drive/v3/files/${file.id}?alt=media`,{
      headers:{'Authorization':'Bearer '+gcToken}
    });
    if(!res.ok){toast('Drive 파일 읽기 실패');return;}
    const text = await res.text();
    const d = JSON.parse(text);
    if(!d.projects){toast('Drive 파일 형식이 올바르지 않습니다');return;}

    // 프로젝트 수가 Drive보다 로컬이 더 많으면 로컬 우선
    if(projects.length > d.projects.length){
      toast('로컬 데이터가 더 많습니다. Drive에 업로드합니다...');
      await driveSaveData(true);
      return;
    }

    if(d.projects)  projects  = d.projects;
    if(d.notices)   notices   = d.notices;
    if(d.campaigns) campaigns = d.campaigns;
    if(d.meetings)  meetings  = d.meetings;
    saveToLS();
    driveLastSaved = driveModified;
    updateDriveStatus('synced');
    toast(`✅ Drive에서 불러왔습니다 (${driveLastSaved.toLocaleString('ko-KR')})`);
    refreshCurrentView();
  }catch(e){
    updateDriveStatus('error');
    toast('Drive 불러오기 오류: '+e.message);
  } finally { driveSyncing=false; }
}

async function driveSaveData(silent){
  if(!gcToken) return;
  if(driveSyncing) return;
  driveSyncing=true; updateDriveStatus('saving'); updateDriveStatusBar('saving');
  try{
    const payload = JSON.stringify({projects,notices,campaigns,meetings,gcClientId});
    if(!driveFileId){
      // Find or create
      const existing = await driveFindFile();
      if(existing) driveFileId = existing.id;
    }
    if(driveFileId){
      // Update existing file
      const boundary = '-------spextrum_boundary';
      const meta = JSON.stringify({name:DRIVE_FILE_NAME,mimeType:'application/json'});
      const body = `--${boundary}\r\nContent-Type: application/json\r\n\r\n${meta}\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n${payload}\r\n--${boundary}--`;
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=multipart`,{
        method:'PATCH',
        headers:{'Authorization':'Bearer '+gcToken,'Content-Type':`multipart/related; boundary=${boundary}`},
        body
      });
    } else {
      // Create new file
      const boundary = '-------spextrum_boundary';
      const meta = JSON.stringify({name:DRIVE_FILE_NAME,mimeType:'application/json'});
      const body = `--${boundary}\r\nContent-Type: application/json\r\n\r\n${meta}\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n${payload}\r\n--${boundary}--`;
      const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{
        method:'POST',
        headers:{'Authorization':'Bearer '+gcToken,'Content-Type':`multipart/related; boundary=${boundary}`},
        body
      });
      const data = await res.json();
      driveFileId = data.id;
    }
    driveLastSaved = new Date();
    updateDriveStatus('synced');
    if(!silent) toast('✅ Drive에 저장됐습니다');
  }catch(e){
    updateDriveStatus('error');
    if(!silent) toast('Drive 저장 오류: '+e.message);
  } finally { driveSyncing=false; }
}

function updateDriveStatus(state){
  const el=document.getElementById('drive-status-badge');
  if(!el) return;
  const states={
    synced:  {text:`✅ Drive 동기화됨 ${driveLastSaved?'· '+driveLastSaved.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}):''}`,bg:'#eaf3de',color:'#3b6d11'},
    saving:  {text:'⏳ Drive 저장 중...',bg:'#e6f1fb',color:'#185fa5'},

function meetToEvent(m){
  const d=m.date.replace(/\./g,'-');
  const st=m.time||'09:00';
  const [h,min]=st.split(':').map(Number);
  const et=`${String(h+1).padStart(2,'0')}:${String(min).padStart(2,'0')}`;
  return{summary:m.title,description:`참석자: ${m.attendees||''}${m.notes?'\n\n'+m.notes:''}`,
    start:{dateTime:`${d}T${st}:00`,timeZone:'Asia/Seoul'},
    end:{dateTime:`${d}T${et}:00`,timeZone:'Asia/Seoul'}};
}

// 프로젝트 태그 기준으로 캘린더 ID 결정
function getCalIdForTask(t, p){
  const name=(t.name||'').toLowerCase();
  const tag=(p?.tag||'').toLowerCase();
  // 서류 마감 — 지원사업 프로젝트에서 특정 키워드만
  const isDeadlineProject=tag.includes('지원사업')||tag.includes('grant');
  const isDeadlineKeyword=name.includes('제출')||name.includes('신청')||name.includes('발표')||name.includes('마감')||name.includes('계약서');
  if(isDeadlineProject && isDeadlineKeyword) return GCAL.deadline;
  // 기본 — 프로젝트 타임라인
  return GCAL.timeline;
}

// 캠페인 → 전시 및 이벤트 캘린더
async function syncCampaignToCalendar(cid){
  if(!gcConnected){toast('캘린더 연동 후 사용할 수 있습니다');return;}
  const c=campaigns.find(x=>x.id===cid);if(!c)return;
  const calId=GCAL.event;
  if(!c.start&&!c.end)return;

  const startDate=(c.start||c.end).replace(/\./g,'-');
  // 종료일 +1 (exclusive)
  const endObj=new Date((c.end||c.start).replace(/\./g,'-'));
  endObj.setDate(endObj.getDate()+1);
  const endDate=endObj.toISOString().split('T')[0];

  const event={
    summary:`[캠페인] ${c.name}`,
    description:`채널: ${c.channel||''}\n담당: ${c.manager||''}\n예산: ${c.budget||''}\n상태: ${c.status||''}`,
    start:{date:startDate},
    end:{date:endDate},
  };

  if(c.calEventId){
    await calFetch('PATCH',`/calendars/${calId}/events/${c.calEventId}`,event);
    toast(`"${c.name}" 캘린더 업데이트됨`);
  } else {
    const res=await calFetch('POST',`/calendars/${calId}/events`,event);
    if(res?.id){c.calEventId=res.id;saveToLS();toast(`"${c.name}" 캘린더에 등록됐습니다`);}
  }
}

async function syncTaskToCalendar(pid,sid,tid){
  if(!gcConnected){toast('캘린더 연동 후 사용할 수 있습니다');return;}
  const p=projects.find(x=>x.id===pid);
  const s=p?.schedules.find(x=>x.id===sid);
  const t=s?.tasks.find(x=>x.id===tid);
  if(!t||!t.dueDate)return;

  const calId=getCalIdForTask(t,p);

  // 시작일 없으면 마감일 하루 전을 시작일로
  const startDate=t.startDate||t.dueDate;
  // Google Calendar 종료일은 exclusive (마감일 다음날)
  const endDateObj=new Date(t.dueDate);
  endDateObj.setDate(endDateObj.getDate()+1);
  const endDate=endDateObj.toISOString().split('T')[0];

  const event={
    summary:`[${p.name}] ${t.name}`,
    description:`스케줄: ${s.name}\n담당자: ${t.meta||'미지정'}\n프로젝트: ${p.name}`,
    start:{date:startDate},
    end:{date:endDate},
    colorId:'6'
  };

  let res;
  if(t.calEventId){
    res=await calFetch('PATCH',`/calendars/${calId}/events/${t.calEventId}`,event);
    if(res) toast(`"${t.name}" 캘린더 업데이트됨`);
  } else {
    res=await calFetch('POST',`/calendars/${calId}/events`,event);
    if(res?.id){t.calEventId=res.id;t.calId=calId;saveToLS();toast(`"${t.name}" 캘린더에 추가됨`);}
  }
}

async function removeTaskFromCalendar(pid,sid,tid){
  const p=projects.find(x=>x.id===pid);
  const s=p?.schedules.find(x=>x.id===sid);
  const t=s?.tasks.find(x=>x.id===tid);
  if(!t?.calEventId)return;
  const calId=t.calId||getCalIdForTask(t,p);
  await calFetch('DELETE',`/calendars/${calId}/events/${t.calEventId}`);

// ─── Gmail 발송 ──────────────────────────────────────────────
async function gmailSend(to,subject,bodyHtml){
  if(!gcToken){toast('Google 연동 후 사용할 수 있습니다');return false;}
  const message=[
    `To: ${to}`,
    'Content-Type: text/html; charset=utf-8',
    'MIME-Version: 1.0',
    `Subject: =?utf-8?B?${btoa(unescape(encodeURIComponent(subject)))}?=`,
    '',
    bodyHtml
  ].join('\n');
  const encoded=btoa(unescape(encodeURIComponent(message))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
  const res=await fetch('https://gmail.googleapis.com/gmail/v1/users/me/messages/send',{
    method:'POST',
    headers:{'Authorization':'Bearer '+gcToken,'Content-Type':'application/json'},
    body:JSON.stringify({raw:encoded})
  });
  if(res.ok){return true;}
  else{toast('이메일 발송 실패');return false;}
}

// Firebase 배열↔객체 변환 처리 (Firebase는 배열을 객체로 저장)
function toArr(v){
  if(v==null) return [];
  if(Array.isArray(v)) return v.filter(x=>x!=null);
  return Object.values(v).filter(x=>x!=null);
}

function sanitizeFirebaseData(d){
  if(!d) return d;
  if(d.projects){
    d.projects=toArr(d.projects).map(p=>{
      if(!p) return null;
      return {...p,
        schedules:toArr(p.schedules).map(s=>{
          if(!s) return null;
          return {...s, tasks:toArr(s.tasks)};
        }).filter(Boolean),
        workAreas:toArr(p.workAreas).map(wa=>{
          if(!wa) return null;
          return {...wa, deliverables:toArr(wa.deliverables)};
        }).filter(Boolean),
        blocks:toArr(p.blocks),
        weeklyGoals:toArr(p.weeklyGoals).map(w=>{
          if(!w) return null;
          return {...w, goals:toArr(w.goals)};
        }).filter(Boolean),
        departments:toArr(p.departments),
        links:toArr(p.links),
        relatedProjects:toArr(p.relatedProjects),
        images:toArr(p.images),
        figmas:toArr(p.figmas),
        refFiles:toArr(p.refFiles),
      };
    }).filter(Boolean);
  }
  if(d.notices)     d.notices    =toArr(d.notices);
  if(d.campaigns)   d.campaigns  =toArr(d.campaigns);
  if(d.meetings)    d.meetings   =toArr(d.meetings);
  if(d.teamMembers) d.teamMembers=toArr(d.teamMembers);
  return d;
}

function applyFirebaseData(d){
  if(!d) return;
  d=sanitizeFirebaseData(d);
  if(d.projects&&d.projects.length)       projects  =d.projects;
  if(d.notices)                           notices   =d.notices;
  if(d.campaigns)                         campaigns =d.campaigns;
  if(d.meetings)                          meetings  =d.meetings;
  if(d.teamMembers&&d.teamMembers.length) teamMembers=d.teamMembers;
  if(d.gcClientId)                        gcClientId=d.gcClientId;
  // Firebase only — localStorage 미사용
}

// 마지막 스냅샷 저장 시각 (30분마다 1회)
let _lastSnapshotTs=0;
const SNAPSHOT_INTERVAL=30*60*1000; // 30분
const MAX_SNAPSHOTS=20;

function fbSaveSnapshot(){
  if(!fbConnected||!fbDB) return;
  const now=Date.now();
  if(now-_lastSnapshotTs < SNAPSHOT_INTERVAL) return;
  _lastSnapshotTs=now;

  const ts=new Date().toISOString().slice(0,16).replace('T','_').replace(':','-'); // 2026-04-23_14-30
  const payload={projects,notices,campaigns,meetings,gcClientId,teamMembers,_savedAt:new Date().toLocaleString('ko-KR')};
  fbDB.ref('spextrum_backup/'+ts).set(payload)
    .then(()=>{
      // 오래된 스냅샷 정리 (MAX_SNAPSHOTS 초과분 삭제)
      fbDB.ref('spextrum_backup').once('value').then(snap=>{
        const keys=Object.keys(snap.val()||{}).sort();
        if(keys.length>MAX_SNAPSHOTS){
          const toDelete=keys.slice(0,keys.length-MAX_SNAPSHOTS);
          toDelete.forEach(k=>fbDB.ref('spextrum_backup/'+k).remove());
        }
      });
    })
    .catch(e=>console.warn('스냅샷 저장 실패:',e));
}

function fbSaveData(){
  if(!fbConnected||!fbDB) return;
  clearTimeout(fbSaveTimer);
  setSaveStatus('saving');
  fbSaveTimer=setTimeout(()=>{
    _fbSaving=true;
    const now=Date.now();
    _localSavedAt=now;
    const payload={projects,notices,campaigns,meetings,gcClientId,teamMembers,_savedAt:now,_deviceId};
    fbDB.ref('spextrum').set(payload)
      .then(()=>{
        _fbRetryCount=0;
        _fbSaving=false;
        updateFbStatus('✅ '+new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}));
        setSaveStatus('saved');
        fbSaveSnapshot(); // 스냅샷 백업 (30분마다)
      })
      .catch(e=>{
        _fbSaving=false;
        _fbRetryCount++;
        if(_fbRetryCount<=MAX_FB_RETRY){
          setTimeout(fbSaveData, 2000*_fbRetryCount);
          setSaveStatus('saving');
        } else {
          _fbRetryCount=0;
          updateFbStatus('❌ 저장 실패');
          setSaveStatus('error');
          toast('⚠️ 저장에 실패했습니다. 데이터 패널에서 수동 저장해주세요.');
        }
      });
  },1200);
}

function fbLoadData(){
  if(!fbConnected||!fbDB) return;

  // ★ Firebase = 진짜 source of truth
  // 항상 Firebase를 먼저 보고, 데이터가 있으면 무조건 Firebase 데이터를 씀
  // localStorage는 Firebase 접근 실패 시 오프라인 백업용으로만 사용
  fbDB.ref('spextrum').once('value').then(snap=>{
    const d=snap.val();
    if(d&&Object.keys(d).length>0){
      // Firebase에 데이터 있음 → 무조건 Firebase 데이터 사용
      try{
        applyFirebaseData(d);
        _localSavedAt=d._savedAt||Date.now();
        // Firebase only — localStorage 미사용
        refreshCurrentView();
        updateSb();
        setSaveStatus('saved');
      }catch(e){console.warn('FB load error:',e);}
    } else {
      // Firebase 비어있음 → 로컬 데이터를 Firebase에 업로드
      const now=Date.now();
      _localSavedAt=now;
      fbDB.ref('spextrum').set({projects,notices,campaigns,meetings,gcClientId,teamMembers,_savedAt:now,_deviceId})
        .then(()=>setSaveStatus('saved'))
        .catch(e=>console.warn('[FB] 업로드 실패:',e));
    }
    fbInitDone=true;
  }).catch(e=>{
    // Firebase 접근 실패 (오프라인) → 로컬 데이터로 계속
    console.warn('FB load failed (offline mode):', e);
    fbInitDone=true;
    setSaveStatus('offline');
  });
}

const KANBAN_COLS=['예정','진행중','검토중','완료'];
const KANBAN_COL_COLORS={'예정':'#854f0b','진행중':'#185fa5','검토중':'#3c3489','완료':'#3b6d11'};
const KANBAN_COL_BG={'예정':'#faeeda','진행중':'#e6f1fb','검토중':'#eeedfe','완료':'#eaf3de'};
let dragProjId=null;

function renderKanban(){
  setBc([{label:'전체 프로젝트'}]);
  document.getElementById('list-sub').textContent=`총 ${projects.length}개 프로젝트 · 칸반 보드`;

  const cols=KANBAN_COLS.map(status=>{
    const plist=projects.filter(p=>{
      // Project status = status of its most recent non-완료 schedule, or 완료 if all done
      const allDone=p.schedules.length>0&&p.schedules.every(s=>s.status==='완료');
      if(allDone&&status==='완료') return true;
      if(status==='완료'&&!allDone) return false;
      return p.schedules.some(s=>s.status===status)||
        (status==='예정'&&p.schedules.length===0);
    });
    const cards=plist.map(p=>{
      const c=COLORS[p.color],pr=prog(p);
      const allT=p.schedules.flatMap(s=>s.tasks);
      return `<div class="kanban-card" draggable="true"
        ondragstart="dragStart(event,'${p.id}')"
        ondragend="dragEnd(event)"
        onclick="openProj('${p.id}')">
        <span class="kc-tag" style="background:${c.tag};color:${c.tagT}">${p.tag}</span>
        <div class="kc-title">${p.name}</div>
        <div class="kc-meta">
          <span>${p.start} – ${p.end}</span>
          <span style="font-family:var(--mono)">${allT.filter(t=>t.done).length}/${allT.length}</span>
        </div>
        <div class="kc-prog"><div class="kc-prog-fill" style="width:${pr}%;background:${c.dot}"></div></div>
      </div>`;
    }).join('');
    return `<div class="kanban-col" data-status="${status}"
      ondragover="event.preventDefault();this.classList.add('drag-over')"
      ondragleave="this.classList.remove('drag-over')"
      ondrop="dropOnCol(event,'${status}')">
      <div class="kanban-col-head">
        <span class="kanban-col-title" style="color:${KANBAN_COL_COLORS[status]}">${status}</span>
        <span class="kanban-col-count">${plist.length}</span>
      </div>
      <div class="kanban-cards">${cards||'<div style="font-size:14px;color:var(--text3);padding:8px 6px">없음</div>'}</div>
    </div>`;
  }).join('');

  document.getElementById('proj-grid').outerHTML=
    `<div id="kanban-board" class="kanban-wrap" style="padding-left:0;padding-right:0">${cols}</div>`;
  showView('v-list');
}

function dragStart(e,id){dragProjId=id;e.currentTarget.classList.add('dragging');e.dataTransfer.effectAllowed='move';}
function dragEnd(e){e.currentTarget.classList.remove('dragging');document.querySelectorAll('.kanban-col').forEach(c=>c.classList.remove('drag-over'));}
function dropOnCol(e,status){
  e.preventDefault();
  document.querySelectorAll('.kanban-col').forEach(c=>c.classList.remove('drag-over'));
  if(!dragProjId)return;
  const p=projects.find(x=>x.id===dragProjId);
  if(!p)return;
  // Set all schedules to the dropped status
  if(status==='완료') p.schedules.forEach(s=>s.status='완료');
  else if(p.schedules.length>0){
    // Set the most recent non-완료 schedule
    const active=p.schedules.find(s=>s.status!=='완료')||p.schedules[p.schedules.length-1];
    active.status=status;
  }
  saveToLS();toast(`"${p.name}" → ${status}`);renderKanban();
}

function openSearch(){

  searchOpen=true;
  const ov=document.createElement('div');ov.className='search-overlay';ov.id='search-ov';
  ov.innerHTML=`<div class="search-box">

      <input class="search-inp" id="search-inp" placeholder="프로젝트, 태스크, 공지, 캠페인 검색..." autocomplete="off" oninput="doSearch(this.value)">
      <span class="search-esc" onclick="closeSearch()">ESC</span>
    </div>
    <div class="search-results" id="search-results"><div class="search-empty">검색어를 입력하세요</div></div>
  </div>`;
  document.body.appendChild(ov);
  ov.addEventListener('click',e=>{if(e.target===ov)closeSearch();});

function closeSearch(){
